   explanation:'Assigning a manufacturing TEVP worker to a construction site — even temporarily — is an immigration offence for both the worker and the employer.',
   why:'The tiered permit system balances labour market access with protection of Malaysian workers.',
   hrbp:'Conduct periodic audits of foreign workers\' permits versus their actual roles. Any mismatch is a live offence.',
   mistakes:['Temporarily assigning a TEVP worker to a different sector without understanding the restriction','Assuming inter-company transfers within the same group are permissible'],
   scenario:'Manufacturing TEVP worker assigned to sister company\'s construction site for 2 weeks. Permissible? Answer: No. Employer-specific AND sector-specific. Both violations exist.',
   law:'Immigration Act 1959/63; Immigration Regulations; MOHA Directives',
   takeaway:'TEVP = locked to employer AND sector. No reassignment without new permit. Audit annually.'},

  {id:'f2', title:'Employer Obligations for Foreign Workers',
   intro:'Passport holding is illegal. Full stop. And it is also a human trafficking indicator.',
   concept:'Employers have extensive statutory obligations when hiring foreign workers — beyond just paying a levy.',
   rule:'Key obligations: levy payment, adequate accommodation (Accommodation Act 1990), annual FOMEMA screening, SOCSO coverage from Day 1, permit renewal. Holding passports is illegal.',
   explanation:'Passport holding is prohibited under the Passports Act 1966. It is also one of the FATF human trafficking indicators. Treat any discovery of passport holding as a serious compliance breach.',
   why:'Foreign workers are a vulnerable group prone to exploitation. Employer obligations create a minimum welfare floor.',
   hrbp:'If you discover any manager holding foreign worker passports — even "for safekeeping" — issue an immediate directive, return all passports, and document the remediation.',
   mistakes:['Holding passports "for safekeeping" — this is illegal regardless of the stated reason','Not registering foreign workers for SOCSO from Day 1 of employment'],
   scenario:'Dormitory built in 2010, never upgraded, fails audit. Exposure? Answer: Non-compliance with Housing and Amenities Act — fines and potential suspension of work permit quotas.',
   law:'Passports Act 1966 (Section 12); Immigration Act 1959/63; Workers\' Minimum Standards of Housing and Amenities Act 1990',
   takeaway:'Hold passports = commit a criminal offence. Return all foreign worker passports immediately if any are held. Register for SOCSO from Day 1.'},
  {id:'f3', title:'FOMEMA — Annual Health Screening for Foreign Workers',
   intro:'Every foreign worker must undergo FOMEMA screening annually. Failure to comply affects permit renewal.',
   concept:'FOMEMA (Foreign Workers Medical Examination Monitoring Agency) manages the compulsory annual medical examination for all foreign workers in Malaysia.',
   rule:'Employers must ensure all foreign workers undergo FOMEMA screening within the prescribed period (usually annually before permit renewal). Workers who fail the medical are required to be repatriated.',
   explanation:'The employer bears responsibility for scheduling and funding FOMEMA. A foreign worker with an expired FOMEMA clearance is non-compliant even if the work permit itself is current.',
   why:'FOMEMA protects public health by identifying communicable diseases and ensures foreign workers are medically fit for work.',
   hrbp:'Build a FOMEMA expiry calendar into your foreign worker tracking system. The lead time for scheduling is significant — start 2 months before the expiry date. Failed FOMEMA results require immediate escalation to legal.',
   mistakes:['Allowing foreign workers to continue working after FOMEMA expiry','No tracking system — FOMEMA deadlines managed ad hoc per supervisor'],
   scenario:'Work permit valid. FOMEMA expired 3 months ago. Worker continues working. Compliance status? Answer: Non-compliant. FOMEMA and work permit are separate obligations. An expired FOMEMA is an independent compliance failure.',
   law:'Immigration Act 1959/63; FOMEMA regulations; Ministry of Home Affairs directives',
   takeaway:'FOMEMA and work permit are separate compliance tracks. Track FOMEMA expiry independently. Start renewal process 60 days before expiry.'},

  {id:'f4', title:'Repatriating a Foreign Worker — Process and Obligations',
   intro:'When a foreign worker\'s employment ends, the employer has repatriation obligations. Getting this wrong creates criminal liability.',
   concept:'When a foreign worker\'s employment ends (resignation, termination, permit expiry), the employer has a legal obligation to facilitate and fund repatriation to the worker\'s home country.',
   rule:'Employer obligations on exit: cancel the work permit with Immigration, arrange and fund the worker\'s return flight, ensure the worker has valid travel documents (passport — which the employer must not have been holding), and settle all outstanding wages within 7 days.',
   explanation:'A foreign worker who remains in Malaysia after their permit expires becomes undocumented. The employer who failed to repatriate them faces potential liability under the Immigration Act.',
   why:'Foreign workers are a vulnerable group. Without employer-facilitated repatriation, many would remain unlawfully without means to return home.',
   hrbp:'On termination of any foreign worker: immediate checklist — (1) cancel permit with Immigration, (2) confirm passport is with the worker (not held by you), (3) book and fund return flight, (4) settle all wages within 7 days, (5) document every step.',
   mistakes:['Terminating a foreign worker without arranging repatriation — leaving them undocumented in Malaysia','Outstanding wages not paid within the 7-day requirement'],
   scenario:'Foreign worker resigns with 2 weeks notice. Last day arrives. Employer has their passport "for safekeeping." Steps? Answer: (1) Return passport IMMEDIATELY — holding it is illegal, (2) Cancel work permit, (3) Fund return flight, (4) Pay final wages within 7 days of last day.',
   law:'Immigration Act 1959/63; Employment Act 1955 (wage payment); Passports Act 1966',
   takeaway:'Repatriation is an employer obligation and expense. Cancel permit, return passport, fund flight, pay wages. All within the statutory deadlines. Document everything.'},

  {id:'f5', title:'Foreign Worker Quota and Levy — Planning Ahead',
   intro:'Foreign worker quotas are approved by the Ministry. Exceeding them or not planning ahead creates operational gaps.',
   concept:'Employers in approved sectors can hire foreign workers up to an approved quota (ratio of foreign to local workers). The annual levy is paid to the government and is the employer\'s cost.',
   rule:'Quota approval: apply to the Ministry of Human Resources before hiring. Levy: varies by sector and nationality. Levy cannot be passed to the worker in a way that reduces wages below the minimum.',
   explanation:'The quota ratio: in manufacturing, typically up to 33% of total workforce can be foreign workers (varies by sector and government policy). Exceeding the quota without approval is an offence.',
   why:'The quota system balances labour market access with local employment protection. Levy revenue funds skills development and social programmes.',
   hrbp:'Annual workforce planning must include foreign worker quota review. Apply for quota increases at least 3–6 months before the projected need — processing times are lengthy.',
   mistakes:['Not reviewing and renewing quota annually — operating on an outdated approval','Attempting to recover levy costs through wage deductions below minimum wage'],
   scenario:'Manufacturing company\'s peak season needs 50 additional foreign workers. Current quota is 30. Timeline to additional workers? Answer: Apply for increased quota, await approval (3-6 months), then recruitment and immigration processing (another 2-3 months). Total: 5-9 months minimum. Annual planning is not optional.',
   law:'Employment Act 1955; Immigration Act 1959/63; sector-specific workforce regulations',
   takeaway:'Quota planning is annual. Start quota increase applications 6 months ahead of need. Levy is employer cost. Never recover levy through wage deductions.'},
],

'ir': [
  {id:'ir1', title:'Industrial Court Remedies — What Employers Really Face',
   intro:'The real cost of losing an unfair dismissal case is often far higher than expected.',
   concept:'The Industrial Court has two primary remedies for unfair dismissal: reinstatement and compensation in lieu.',
   rule:'Back wages: capped at 24 months\' salary. Compensation: typically 1 month per year of service. Plus legal costs. Cases can run 2–4 years.',
   explanation:'A RM5,000/month employee dismissed after 5 years: 24 months back wages (RM120,000) + 5 months compensation (RM25,000) = RM145,000 potential exposure.',
   why:'Employment provides livelihood. Unfair dismissal damages must reflect the full scope of harm — not just lost wages.',
   hrbp:'Settle weak cases early. The 24-month cap sounds comforting until you add years of legal fees and management time. A RM4,000/month employee, 2-year case = RM96,000 capped back wages + compensation.',
   mistakes:['Assuming the 24-month cap makes unfair dismissal "manageable" — it doesn\'t account for compound costs','Fighting cases that have clear procedural weaknesses'],
   scenario:'Employee RM4,000/month, dismissed, wins 2.5 years later. Court awards max back wages + 4 months compensation. Total? Answer: RM96,000 + RM16,000 = RM112,000.',
   law:'Industrial Relations Act 1967, Section 30; Industrial Court Rule 2010',
   takeaway:'Back wages (max 24 months) + compensation (years of service) + legal costs. Settle weak cases early. A documented, procedurally fair dismissal is far cheaper than defending bad ones.'},
  {id:'ir2', title:'The 60-Day Filing Window — Both Sides of the Clock',
   intro:"The 60-day window to file an unfair dismissal claim is strict. Courts rarely grant extensions. Both employers and employees should understand how it works.",
   concept:'Under IRA Section 20(1A), employees who believe they were dismissed without just cause must file with the Director General of Industrial Relations (DGIR) within 60 days of dismissal.',
   rule:'60 days from dismissal. Filed at the Industrial Relations Department (IRD). Not the Industrial Court. DGIR attempts conciliation first. Only if conciliation fails is the matter referred to the Industrial Court.',
   explanation:'The 60-day clock starts from the date of dismissal — not when the employee decides to act. Extensions are granted only for fraud, incapacity, or similarly exceptional circumstances.',
   why:'Time limitations create finality and prevent stale claims.',
   hrbp:'From the employer side: the 60-day clock is your window of vulnerability. Once it passes without a claim, you have significant legal closure.',
   mistakes:['Employees filing directly at the Industrial Court (must go to IRD first)','Employees waiting 45 days before seeking legal advice, leaving insufficient time'],
   scenario:'Employee dismissed 1 January. Files at IRD on 5 March — 63 days later. Time-barred? Answer: Yes. The 60-day limit under Section 20(1A) is strict. Mere oversight does not justify extension.',
   law:'Industrial Relations Act 1967, Section 20(1A)',
   takeaway:'60 days. Hard limit. Filed at IRD (not Industrial Court). Employers: document the date of dismissal. Employees: file early.'},

  {id:'ir3', title:'Conciliation at the Industrial Relations Department',
   intro:"Conciliation is the first step after filing an unfair dismissal claim. Most cases settle here — and for good reason.",
   concept:'After filing at the IRD, the DGIR appoints an Industrial Relations Officer to conduct conciliation between the parties.',
   rule:'Conciliation is a mediated negotiation aimed at reaching a settlement. If conciliation succeeds: the case ends. If it fails: the DGIR may refer the matter to the Industrial Court.',
   explanation:'Conciliation is confidential. Without prejudice. Settlement at this stage costs less, takes less time, and is more flexible than a court award.',
   why:'The conciliation step provides a structured settlement opportunity before expensive litigation begins.',
   hrbp:'Prepare for conciliation like you would prepare for court — but go in willing to settle. A reasonable settlement at conciliation is almost always better than the best case at Industrial Court.',
   mistakes:['Attending conciliation without authority to settle','Being unreasonable at conciliation, forcing referral to Industrial Court on a weak case'],
   scenario:'DGIR schedules conciliation. Employer sends HR manager with no settlement authority. Employee wants RM30,000. Case goes to Industrial Court. 2 years later employer pays RM85,000. What went wrong? Answer: Lack of settlement authority and commercial judgment at conciliation stage.',
   law:'Industrial Relations Act 1967, Sections 18–20',
   takeaway:'Attend conciliation with settlement authority. Evaluate the claim honestly. A reasonable conciliation settlement is almost always cheaper than a court referral.'},

  {id:'ir4', title:'Trade Unions — Recognition and Collective Bargaining',
   intro:"Union recognition is a formal legal process. Ignoring it or resisting it unlawfully creates serious liability.",
   concept:"Trade unions gain recognition through a claim to the Director General of Trade Unions. Once recognised, the employer must negotiate in good faith on collective bargaining matters.",
   rule:'Union recognition entitles the union to: collective bargaining rights, right to represent members in disciplinary matters, right to information relevant to bargaining.',
   explanation:"Collective bargaining is mandatory once a union is recognised — employers cannot refuse to negotiate. However, collective agreements can exclude certain management prerogatives (hiring, firing, promotion) if the employer reserves them.",
   why:"Trade unions protect workers' collective interests. Malaysian law balances union rights with management flexibility.",
   hrbp:'If a recognition claim is received: immediately involve legal counsel. Do not take any adverse action against union members or activists during the recognition process.',
   mistakes:['Dismissing union activists during a recognition process — viewed as victimisation','Negotiating collective agreements without legal counsel and inadvertently conceding management rights'],
   scenario:"Union files a recognition claim. Management wants to retrench two of the union's founders. Is this permissible? Answer: Extremely high risk. Courts will scrutinise this as victimisation. Do not proceed without legal advice.",
   law:'Trade Unions Act 1959; Industrial Relations Act 1967, Part III',
   takeaway:'Union recognition = mandatory good-faith bargaining. Get legal counsel immediately on receipt of any recognition claim. Never take adverse action against union activists without legal advice.'},
  {id:'ir5', title:'Collective Agreements — Structure and Effect',
   intro:'A collective agreement, once registered, has the force of an award of the Industrial Court. It cannot be changed unilaterally.',
   concept:'A collective agreement (CA) is a negotiated agreement between a recognised union and an employer setting out the terms and conditions of employment for unionised employees.',
   rule:'Once registered with the Industrial Court, a CA is binding on both parties. It supersedes individual employment contracts for covered employees on matters it addresses. CAs typically run for 3 years.',
   explanation:'Management prerogative matters: employers typically reserve the right to manage the business, determine work methods, and make promotions/transfers — these are excluded from collective bargaining by law.',
   why:'Collective agreements set a stable, certain employment framework for a defined period. Both parties agree not to strike or lockout during the CA period.',
   hrbp:'When a CA expires: begin negotiations early (at least 3 months before expiry). No industrial action is permitted during the currency of the CA. Brief your business leaders on what is and is not negotiable.',
   mistakes:['Changing terms covered by the CA without union agreement — a direct CA breach','Not briefing line managers on what the CA prohibits — inadvertent violations are common'],
   scenario:'Company wants to change shift patterns for unionised employees. Shift patterns are covered by the CA. Process? Answer: You cannot change unilaterally. Bring the proposal to the union. If the CA term has not expired, you need the union\'s agreement. If it has, the new CA is the vehicle for the change.',
   law:'Industrial Relations Act 1967, Part III; Trade Unions Act 1959',
   takeaway:'Registered CA = court award. Cannot be varied unilaterally. Plan CA expiry dates. Begin negotiations early. Know what is in the CA so you don\'t inadvertently breach it.'},
  {id:'ir6', title:'Managing Grievances — A Fair Internal Process',
   intro:'An unresolved grievance that escalates to the Industrial Court is far more expensive than one handled well internally.',
   concept:'A grievance is a formal complaint by an employee about their employment, working conditions, or the behaviour of a colleague or manager. A structured grievance procedure is both a legal risk management tool and a fairness mechanism.',
   rule:'A fair grievance process: (1) Written submission, (2) Impartial investigation, (3) Opportunity for the employee to be heard, (4) Decision communicated in writing, (5) Appeal path. Outcome must be communicated within a reasonable timeframe.',
   explanation:'Failure to investigate a grievance — particularly about harassment, discrimination, or safety — may itself constitute a breach of the implied duty of mutual trust and confidence, supporting a constructive dismissal claim.',
   why:'Employees who feel heard are less likely to escalate externally. A well-run grievance process is the most cost-effective form of dispute resolution.',
   hrbp:'Track all grievances — category, outcome, resolution time. If specific departments or managers generate disproportionate grievances, that is a management effectiveness issue requiring direct intervention.',
   mistakes:['Grievance filed, no acknowledgement for 3 weeks — employee feels dismissed', 'Grievance investigated by the manager the complaint is about — impartiality destroyed'],
   scenario:'Employee raises a grievance about her manager\'s behaviour. HR assigns the investigation to the manager\'s peer — who is also the manager\'s close friend. Issue? Answer: Impartiality is compromised. Assign an independent investigator. If no internal person is independent enough, use an external one.',
   law:'Industrial Relations Act 1967; Employment Act 1955; Natural justice principles',
   takeaway:'Grievances: acknowledge promptly, investigate impartially, communicate outcome in writing, offer appeal. Track patterns. Unresolved grievances become Industrial Court claims.'},

  {id:'ir7', title:'Employment Records — What to Keep and for How Long',
   intro:'Employment records are your evidence in any dispute. Not having them is the most avoidable HR mistake.',
   concept:'Employment records document the employment relationship and provide the evidence base for any disciplinary, redundancy, or dispute proceeding.',
   rule:'Key records to maintain: employment contract, offer letter, performance reviews, disciplinary records, leave records, payroll records, training records, and exit documentation. Recommended retention: 7 years post-employment for most records.',
   explanation:'In litigation, "we don\'t have a record of that" is never neutral. Courts draw adverse inferences when records that should exist do not. PDPA also requires records to be accurate and retained only as long as necessary.',
   why:'Records are the evidentiary foundation of employment law compliance. Without them, you cannot defend decisions you made correctly.',
   hrbp:'Build an employment records policy: what to retain, where it lives, who can access it, how long it is kept, and how it is destroyed when retention period ends. HRMS should enforce this — not individual managers.',
   mistakes:['Performance issues managed verbally with no written record — leaving nothing to show the Industrial Court','Retaining sensitive personal data indefinitely "just in case" — PDPA violation'],
   scenario:'Former employee files unfair dismissal claim 3 years after leaving. Company has no performance records from that period — the manager used to "sort things out verbally." Defence options? Answer: Limited. Without documented performance evidence, the Industrial Court will rely on the employee\'s account. This is entirely preventable.',
   law:'Employment Act 1955; PDPA 2010; Industrial Relations Act 1967',
   takeaway:'Every significant HR decision must generate a written record. Verbal management leaves no defence. 7-year retention for core employment records. PDPA limits retention of sensitive data — balance both requirements.'},
],

// HR PRACTICE TOPICS
'talent': [
  {id:'ta1', title:'Recruitment Strategy — Building a Hiring System',
   intro:'Ad hoc hiring is expensive. A talent acquisition system is a competitive advantage.',
   concept:'Talent Acquisition (TA) is the strategic function of identifying, attracting, and selecting people who will drive organisational performance.',
   rule:'Effective TA requires: clear role design, structured selection processes, consistent candidate experience, and data-driven decision-making.',
   explanation:'Most organisations hire reactively. High-performing TA functions build pipelines before roles are open, maintain employer brand year-round, and use structured assessments to reduce bias.',
   why:'Hiring errors are expensive — average cost of a bad hire = 50–200% of annual salary.',
   hrbp:'Audit your current hiring process: How long does it take? Where do candidates drop off? What does your offer acceptance rate look like? Start with data.',
   mistakes:['Unstructured interviews relying on "gut feel"','Job descriptions that list 20 requirements and attract no one','No candidate feedback loop — candidates ghost because employers ghosted first'],
   scenario:'A hiring manager wants to "interview a few people and pick the best one." What should TA propose instead? Answer: Structured competency-based interviews with a consistent rubric, applied equally to all candidates.',
   takeaway:'TA is a system, not an activity. Define: who you need → how to find them → how to assess them → how to close them. Measure everything.',
   diagram:`<svg viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif">
