   why:'Resignation is a contractual act. Once the employer acts on it (starts recruitment, plans transition), reversal creates operational disruption.',
   hrbp:"Duress-based resignations are more common than HR realises. 'Resign or be fired' conversations — even informal ones — can result in unfair dismissal claims. Never give ultimatums.",
   mistakes:['Verbally rejecting a retraction and then claiming there was no choice','Issuing "resign or face DI" ultimatums without legal advice'],
   scenario:"Employee pressured to resign or face DI. She resigns. Two weeks later files unfair dismissal claiming duress. Outcome? Answer: If she proves the ultimatum, resignation may be set aside. Industrial Court treats it as dismissal.",
   law:'Contracts Act 1950; Industrial Relations Act 1967 (duress cases)',
   takeaway:"Accept resignations in writing promptly — this creates certainty. Never issue resign-or-else ultimatums. Coerced resignations = constructive dismissal risk."},

  {id:'t9', title:'Industrial Court Remedies — The Real Cost of Losing',
   intro:"The real exposure from an unfair dismissal finding is often far higher than employers anticipate.",
   concept:"The Industrial Court awards remedies for unfair dismissal: reinstatement or compensation in lieu.",
   rule:'Back wages: capped at 24 months salary. Compensation in lieu of reinstatement: approximately 1 month per year of service. Cases typically take 2–4 years — the 24-month cap runs from the date of dismissal to the award date.',
   explanation:"A RM5,000/month employee, dismissed after 5 years, who wins 2.5 years later: 24 months back wages (RM120,000) + 5 months compensation (RM25,000) = RM145,000 exposure. Plus legal costs.",
   why:'Employment provides livelihood. Unfair dismissal remedies must reflect the full scope of harm.',
   hrbp:"Settle weak cases early. The 24-month cap sounds manageable until you add years of management distraction, external legal costs, and reputational impact.",
   mistakes:['Assuming the 24-month back wages cap makes unfair dismissal "manageable"','Fighting cases that have clear procedural weaknesses hoping for a better outcome'],
   scenario:'RM4,000/month employee dismissed. Wins unfair dismissal 2.5 years later. Court awards maximum back wages + 4 months compensation (4 years service). Total? Answer: RM96,000 + RM16,000 = RM112,000.',
   law:'Industrial Relations Act 1967, Section 30; Industrial Court Rule 2010',
   takeaway:'Back wages (max 24 months) + compensation (service years) + legal costs. Settle weak cases early. Document every case as if it will be litigated.'},
  {id:'t10', title:'Mutual Separation Agreements — Getting Them Right',
   intro:'A mutual separation looks clean. But if not structured correctly, it leaves both parties exposed.',
   concept:'A mutual separation agreement (MSA) is a negotiated arrangement where both parties agree to end employment on agreed terms. It is neither a dismissal nor a resignation.',
   rule:'For an MSA to be binding and to bar further claims: must be in writing, must include adequate consideration (above statutory minimums), must explicitly state it is in full and final settlement of all claims under the EA and IRA.',
   explanation:'An MSA without explicit IRA waiver may not prevent an unfair dismissal claim. The employee could accept the payout and still file — arguing the "mutual" agreement was not truly voluntary.',
   why:'Both parties sometimes prefer a clean break with a structured payment over the uncertainty of litigation.',
   hrbp:'Have legal draft the MSA — not HR. Include: the payment amount, explicit full and final settlement, waiver of EA and IRA claims, and ideally independent legal advice for the employee.',
   mistakes:['Using a generic "voluntary separation" letter without IRA claim waiver','No consideration above statutory minimums — court may find inadequate consideration'],
   scenario:'Company and employee agree to end employment. Employee receives 2 months\' pay, signs a generic letter. 3 months later files unfair dismissal. Barred? Answer: Depends entirely on whether the letter explicitly waived IRA claims. Generic letters often fail this test.',
   law:'Industrial Relations Act 1967; Contracts Act 1950',
   takeaway:'MSA must: be in writing, exceed statutory minimums, explicitly waive all EA and IRA claims, be properly executed. Legal drafting is non-negotiable here.'},

  {id:'t11', title:'Transfer of Employment — Can You Move an Employee Without Consent?',
   intro:'Geographic transfers and role changes are a constant source of constructive dismissal claims.',
   concept:'Transferring an employee to a different location, role, or entity requires the contractual right to do so. Without it, a unilateral transfer may constitute a fundamental breach of contract.',
   rule:'If the employment contract has a mobility clause (e.g., "employee may be required to work at any of the company\'s offices across Malaysia"), a transfer to a new location is permissible. Without such a clause, transfer requires consent.',
   explanation:'Even with a mobility clause, a transfer must not be exercised capriciously. A genuine business reason must exist. A transfer designed to pressure an employee to resign = constructive dismissal.',
   why:'Employment contracts define the terms of the relationship. Changing fundamental terms (location, role) without consent is a breach of those terms.',
   hrbp:'Include a mobility clause in contracts for roles where transfers are foreseeable. When exercising a transfer, document the genuine business reason. Give adequate notice.',
   mistakes:['Transferring an employee to a remote location with no genuine business reason — appearing designed to force resignation','No mobility clause and assuming transfers are always permissible'],
   scenario:'Finance manager transferred from KL to Kota Kinabalu with 2 weeks notice. No mobility clause in contract. She resigns and files constructive dismissal. Outcome? Answer: Strong constructive dismissal claim — fundamental change to working location without contractual basis or consent.',
   law:'Contracts Act 1950; Industrial Relations Act 1967, Section 20',
   takeaway:'Mobility clause in contract = permissible to transfer (with genuine reason and adequate notice). No mobility clause = consent required. Punitive transfers always risk constructive dismissal.'},
],

'misconduct': [
  {id:'m1', title:'The Domestic Inquiry (DI) — Why It Matters',
   intro:'Skipping the Domestic Inquiry is the single most expensive HR mistake you can make.',
   concept:'A Domestic Inquiry is an internal disciplinary hearing that must occur before dismissing an employee for misconduct.',
   rule:'Process: (1) Charge sheet issued, (2) Employee given response time, (3) Hearing held, (4) Finding made, (5) Penalty determined.',
   explanation:'A show-cause letter alone is NOT a DI. The hearing is mandatory. The employee has the right to present a defence and call witnesses. The panel must be impartial.',
   why:'Natural justice — the right to be heard before punishment. Courts expect this standard.',
   hrbp:'Show-cause → hearing (not just written response) → finding → penalty. Document every stage. The DI outcome is your primary defence in any Industrial Court proceeding.',
   mistakes:['Issuing show-cause → receiving response → dismissing = NOT a DI','Using the direct supervisor as DI panel member (impartiality issue)'],
   scenario:'Employee falsifies timesheet. SCL issued, poor response received, immediately terminated. Valid DI? Answer: No. A hearing must be held. Written response alone does not satisfy the DI requirement.',
   law:'Employment Act 1955, Section 14(1); Industrial Relations Act 1967, Section 20',
   takeaway:'Show-cause is step one. A hearing is step two. Both are required. Skipping the hearing exposes any dismissal to automatic procedural challenge.',
   diagram:`<svg viewBox="0 0 320 60" xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif">
  ${['Charge Sheet','Response Time','Hearing','Finding','Penalty'].map((s,i)=>`
  <rect x="${10+i*62}" y="10" width="54" height="38" rx="5" fill="#1e2a38" stroke="#4878a8" stroke-width="1.2"/>
  <text x="${37+i*62}" y="32" text-anchor="middle" fill="#f0ebe0" font-size="8.5" font-weight="500">${s}</text>
  ${i<4?`<text x="${67+i*62}" y="33" text-anchor="middle" fill="#4878a8" font-size="10">→</text>`:''}`).join('')}
</svg>`},

  {id:'m2', title:'The Show-Cause Letter — Getting It Right',
   intro:'A vaguely drafted show-cause letter can destroy an otherwise valid disciplinary case.',
   concept:'The show-cause letter is the foundation of any DI. It defines the charge the employee must answer.',
   rule:'Must specify: the specific allegation, date, time, location of the misconduct. Give 48–72 hours minimum to respond. Deliver personally with acknowledgement, or certified mail.',
   explanation:'Courts apply the rule of natural justice: the accused must know exactly what they\'re charged with to mount a defence. "Attitude problem" is not a charge.',
   why:'Natural justice principle (Audi Alteram Partem) — the right to know the case against you.',
   hrbp:'"On 14 March 2025 at approximately 3:00 PM in Meeting Room B, you were observed raising your voice at a client in the presence of three colleagues" — this is the standard.',
   mistakes:['Vague charges like "misconduct" or "attitude problem"','Sending via WhatsApp without formal delivery record'],
   scenario:'SCL accuses employee of "insubordination and attitude problem." He challenges at Industrial Court. Risk? Answer: High. Vague charge prevents proper defence. Dismissal may be set aside on procedural grounds alone.',
   law:'Employment Act 1955, Section 14; Natural Justice Principles (Audi Alteram Partem)',
   takeaway:'Specific date. Specific location. Specific behaviour. Specific witnesses if applicable. No templates. Every show-cause letter must be purpose-written.'},

  {id:'m3', title:'Progressive Discipline — The Warning Ladder',
   intro:'Courts expect a progression of discipline before dismissal. Skipping steps is risky.',
   concept:'For most misconduct (not gross), the Industrial Court expects escalating responses before dismissal is appropriate.',
   rule:'Verbal warning → Written warning → Final written warning → Dismissal (after DI). Gross misconduct can skip to DI immediately.',
   explanation:'Warning letters must be signed and acknowledged. Validity period: typically 12–24 months. An old warning may not support current disciplinary action.',
   why:'Employees should have a fair opportunity to correct behaviour before the ultimate penalty.',
   hrbp:'Dismissed for being late 3 times, no prior warnings. Likely outcome? Dismissal set aside. Tardiness alone ≠ dismissal without escalation.',
   mistakes:['Jumping straight to dismissal for first-time non-gross misconduct','Using warnings over 2 years old as prior disciplinary history'],
   scenario:'Employee dismissed after 3 late arrivals, no prior warnings. What happens at Industrial Court? Answer: Dismissal likely set aside. At most, a written warning was warranted.',
   law:'Industrial Relations Act 1967, Section 20; Industrial Court practice',
   takeaway:'Progressive discipline is not just best practice — it is what the Industrial Court expects. Absent gross misconduct, skip steps and lose.',
   diagram:`<svg viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif">
  ${[['Verbal','#605850'],['Written\nWarning','#dc7a5a'],['Final\nWarning','#d4924a'],['DI &\nDismissal','#a84848']].map(([l,c],i)=>`
  <rect x="${8+i*78}" y="8" width="68" height="62" rx="6" fill="${c}20" stroke="${c}" stroke-width="1.5"/>
  <text x="${42+i*78}" y="${32+i*0}" text-anchor="middle" fill="${c}" font-size="9" font-weight="700">${l.split('\n')[0]}</text>
  ${l.split('\n')[1]?`<text x="${42+i*78}" y="46" text-anchor="middle" fill="${c}" font-size="9" font-weight="700">${l.split('\n')[1]}</text>`:''}
  <text x="${42+i*78}" y="60" text-anchor="middle" fill="#605850" font-size="8">Step ${i+1}</text>
  ${i<3?`<text x="${79+i*78}" y="42" text-anchor="middle" fill="#605850" font-size="12">›</text>`:''}`).join('')}
</svg>`},

  {id:'m4', title:'Suspension During Investigation',
   intro:'You can suspend during a DI — but the 2-week paid rule is strict.',
   concept:'EA allows suspension pending investigation for up to 2 weeks with full pay.',
   rule:'If the inquiry is not completed within 2 weeks, the employer must either reinstate with back pay OR get Director General of Labour approval to extend.',
   explanation:'Unpaid suspension beyond 2 weeks without DG approval is an EA violation. The clock starts from the date of the suspension notice letter.',
   why:'Allows investigation without interference while ensuring the employee is not financially penalised before guilt is established.',
   hrbp:'Set a calendar reminder on Day 1 of any suspension. If DI isn\'t wrapped by Day 14, apply to DG or reinstate immediately.',
   mistakes:['Letting suspension run beyond 2 weeks without DG approval','Issuing unpaid suspension from the outset'],
   scenario:'Suspended 1 March for fraud. DI scheduled for 15 March, witnesses unavailable, now 16 March. What must HR do? Answer: Complete inquiry immediately, reinstate, or apply to DG for extension.',
   law:'Employment Act 1955, Section 14(2)',
   takeaway:'2 weeks. Paid. Clock starts on suspension day. Miss it without DG approval and you\'ve created a separate EA violation.'},
  {id:'m5', title:'Sexual Harassment — Mandatory Inquiry Obligations',
   intro:"Since 2023, employers have mandatory obligations to inquire into sexual harassment complaints. Inaction is itself an offence.",
   concept:"EA 2022 amendment: employers must inquire into any complaint of sexual harassment in the workplace. Failure to conduct an inquiry is an offence under EA Section 81F.",
   rule:'Obligations: establish a complaint mechanism, handle complaints confidentially, protect complainants from retaliation, inquire even if the harasser is a third party (client, vendor).',
   explanation:"Sexual harassment includes physical, verbal, non-verbal, visual, and psychological acts of a sexual nature. The employer's duty exists even for third-party harassers if the incident occurs in the course of work.",
   why:"Workplace sexual harassment was endemic and often unreported. Mandatory inquiry shifts the burden from 'wait for complaints' to 'actively protect employees'.",
   hrbp:"Post-2023, having a sexual harassment policy is the minimum. You need: a complaint mechanism, a trained investigation panel, confidentiality protocols, and anti-retaliation protections.",
   mistakes:['No formal complaint mechanism — employees forced to report informally','Taking adverse action against a complainant (this is a separate criminal offence)'],
   scenario:'Female employee reports that a client made repeated inappropriate comments during a site visit. Employer must? Answer: Inquire into the complaint. Third-party harasser does not remove the obligation. Restrict client access if necessary.',
   law:'Employment Act 1955, Sections 81A–81F (as amended by EA Amendment 2022)',
   takeaway:'Mandatory inquiry. Confidentiality. Anti-retaliation protection. These are not optional. Apply even when the harasser is an external third party.'},

  {id:'m6', title:'Social Media Misconduct — Outside Work Hours Still Counts',
   intro:"Employees can be dismissed for social media posts made outside working hours if the content violates policy or brings the company into disrepute.",
   concept:'Social media misconduct is not limited to working hours or company devices. The content and its impact on the company is what matters.',
   rule:'Triggers: disclosing confidential information, defaming the company or colleagues, content violating company values or public decency. Must have a clear social media policy acknowledged by employees.',
   explanation:'Proportionality applies: a personal rant about being tired at work is not the same as leaking client data publicly. Conduct a DI — the same process applies as any other misconduct.',
   why:'Social media blurs the line between private and public. Company policies must extend to online conduct because the reputational and confidentiality risks are real.',
   hrbp:'Build your social media policy with three categories: (1) prohibited content, (2) disclosure obligations (identify as employee opinion, not company position), (3) consequences. Have employees sign it at onboarding.',
   mistakes:['Acting on social media misconduct without a policy in place','Treating off-hours social media posts as automatically exempt from disciplinary action'],
   scenario:'Employee posts a screenshot of a confidential internal email on personal Instagram, outside office hours, on personal phone. Disciplinable? Answer: Yes. Confidentiality obligations apply 24/7. Timing and device are irrelevant.',
   law:'Employment Act 1955, Section 14; Industrial Court precedents on social media misconduct',
   takeaway:'Social media misconduct: content matters, not timing or device. Have a policy. Apply it consistently. Always DI before dismissal.'},

  {id:'m7', title:'Misconduct vs Negligence — Different Standards Apply',
   intro:"Misconduct is intentional wrongdoing. Negligence is careless failure. The distinction matters enormously for penalty.",
   concept:'Courts distinguish between misconduct (deliberate act violating rules) and negligence (failure to take proper care without malicious intent).',
   rule:'Proportionality test: would a "reasonable employer" dismiss for this act? First-time simple negligence = warning, not dismissal. Gross negligence (repeated, causing serious harm) can warrant dismissal.',
   explanation:'A finance officer who makes a one-time calculation error is not the same as one who repeatedly ignores processes despite warnings. The response must be proportionate.',
   why:'The principle of proportionality — the punishment must fit the severity and nature of the wrong.',
   hrbp:"Courts apply a proportionality test. A first-time mistake by a good employee dismissed immediately = likely unfair. Pattern of negligence despite warnings = dismissal more defensible.",
   mistakes:['Treating negligence as misconduct and imposing the same penalty','Dismissing for a first-time minor error without any prior warnings'],
   scenario:'Finance officer miscalculates a tax filing once, RM500 penalty to company. Dismissed. Challenge at Industrial Court. Likely outcome? Answer: Probably unfair dismissal — single negligent act, no prior warnings, not grave enough.',
   law:'Employment Act 1955, Section 14; Industrial Court award cases on proportionality',
   takeaway:'Negligence ≠ misconduct. Proportionality always applies. Document the pattern before dismissing for negligence. First-time minor errors warrant warnings, not dismissal.'},
  {id:'m8', title:'Conflict of Interest — Employee Obligations',
   intro:'An undeclared conflict of interest is misconduct, even if the employee did nothing wrong beyond the non-disclosure.',
   concept:'Employees have an implied duty to act in their employer\'s best interests and to declare situations where their personal interests may conflict with their duties.',
   rule:'Common conflicts: working for a competitor while employed (moonlighting), conducting personal business using company resources, being a supplier to the company through a related party, receiving gifts from vendors.',
   explanation:'Conflict of interest policies should: define what constitutes a conflict, require annual declarations, establish a review process for declared conflicts, and specify consequences for non-disclosure.',
   why:'Undisclosed conflicts create trust failures and potentially direct financial harm through biased decision-making.',
   hrbp:'Implement an annual conflict of interest declaration process for all employees in roles with procurement, financial, or partner decision-making authority. Document all declarations and the company\'s response.',
   mistakes:['No conflict of interest policy — employees don\'t know what to declare','Treating all declared conflicts as automatic misconduct — the declaration process is designed to enable management, not punishment'],
   scenario:'Employee approves a vendor contract. Post-approval, it is discovered his wife owns the vendor company. He never declared. Misconduct? Answer: Yes — non-disclosure of a material conflict of interest is a serious breach of duty, regardless of whether the contract terms were fair.',
   law:'Fiduciary duties (common law); Employment Act 1955, Section 14',
   takeaway:'Annual declarations. Clear policy. Declared conflicts managed, not automatically punished. Non-disclosure = serious misconduct. Procurement, finance, and BD roles are highest risk.'},

  {id:'m9', title:'Whistleblowing vs Malicious Complaints',
   intro:'Distinguishing a genuine whistleblower from a malicious complainant requires a careful, structured process.',
   concept:'Whistleblowers who raise genuine concerns in good faith are protected under the Whistleblower Protection Act 2010. Employees who make malicious, bad-faith complaints are not protected and may face disciplinary action for the false complaint.',
   rule:'The WPA protects good-faith disclosures of improper conduct. The protection is conditional — if the disclosure is made maliciously or knowing it is false, protection is not available.',
   explanation:'The challenge: HR must investigate complaints without knowing at the outset whether they are genuine or malicious. Process integrity is therefore essential — a fair investigation protects both the company and the legitimate whistleblower.',
   why:'Genuine whistleblowing is a critical corporate governance mechanism. Treating all complaints as valid would be naive; treating all as suspect would chill legitimate disclosure.',
   hrbp:'Build an investigation protocol: investigate independently and thoroughly, maintain confidentiality, protect the complainant from retaliation during the investigation, and only after the investigation determine whether it was made in bad faith.',
   mistakes:['Taking adverse action against a complainant before completing the investigation','No secure internal reporting channel — forcing employees to go to regulators instead'],
   scenario:'Employee files a complaint alleging the finance director is committing fraud. Investigation reveals no fraud; the complaint appears retaliatory for a performance review. Action? Answer: Investigate the bad-faith complaint as a separate matter. But the WPA investigation must have been concluded first, independently, and properly.',
   law:'Whistleblower Protection Act 2010; Employment Act 1955',
   takeaway:'Investigate all complaints properly before drawing conclusions about motive. The investigation process protects both the genuine whistleblower and the company. Document every step.'},

  {id:'m10', title:'Gross Misconduct — Where the Line Is',
   intro:'Gross misconduct justifies summary dismissal — but the definition must be clear and the line must be in the right place.',
   concept:'Gross misconduct is conduct so serious that it fundamentally destroys the employment relationship and justifies immediate termination without notice.',
   rule:'Recognised categories: theft, fraud, physical violence, disclosure of confidential information, sexual harassment, gross insubordination. Must be defined in company policy. Courts apply proportionality even within gross misconduct.',
   explanation:'Not all theft is equal. A cashier taking RM5 from the register is gross misconduct. A junior admin who accidentally takes a pen home is not. Context, amount, intent, and employment record all matter.',
   why:'The gross misconduct category must be defined to give employees fair notice of what conduct will result in summary dismissal.',
   hrbp:'Define gross misconduct categories explicitly in your employee handbook. Be specific — "any form of dishonesty" is too broad. "Theft, fraud, or misappropriation of company funds or property, regardless of amount" is more defensible.',
   mistakes:['Applying gross misconduct label to conduct that is merely serious (warranting warnings, not dismissal)','Summary dismissal without even a brief inquiry, even for clear-cut gross misconduct'],
   scenario:'Long-serving employee (12 years, clean record) takes RM15 of stationery home. Company dismisses for gross misconduct (theft policy applies regardless of amount). Industrial Court outcome? Answer: Court will apply proportionality. 12 years, clean record, RM15 of stationery — dismissal is likely disproportionate. A stern warning was appropriate.',
   law:'Employment Act 1955, Section 14; Industrial Court proportionality cases',
   takeaway:'Gross misconduct requires: clear policy definition + brief inquiry + proportionality assessment. Even clear misconduct requires proportional response. 12-year employee, RM15, clean record = warning, not dismissal.'},
  {id:'m11', title:'Disciplinary Files — Building a Defensible Paper Trail',
   intro:'The DI is only as strong as the paper trail behind it. Courts do not take verbal evidence of prior discipline seriously.',
   concept:'A disciplinary file is the documented record of every warning, show-cause letter, response, hearing, finding, and decision in an employee\'s disciplinary history.',
   rule:'Every disciplinary action must generate: (1) a written document delivered to the employee, (2) employee acknowledgement (even if they disagree), (3) a copy in the HR file, (4) a dated record in the HRMS. The file must be complete, chronological, and internally consistent.',
   explanation:'Industrial Court hearings often turn on what the disciplinary file shows. A file that shows progressive warnings → documented improvement efforts → further breach → DI → dismissal is defensible. A file that shows a single incident → dismissal is not.',
   why:'Natural justice requires documented evidence. Courts cannot evaluate what was said verbally. The paper trail is your only evidence.',
   hrbp:'After every disciplinary conversation — even informal counselling — write a brief contemporaneous note dated and filed. "On 14 March, I met with [employee] to discuss her punctuality. She acknowledged the issue and agreed to improve." Two sentences, dated, filed. This matters in court.',
   mistakes:['Issuing warning letters but not getting them signed or acknowledged','Gaps in the disciplinary file — early warnings existed verbally but no written record'],
   scenario:'Employee dismissed for poor performance. Disciplinary file contains: one written warning from 2 years ago and a dismissal letter. Nothing else. Industrial Court outcome? Answer: Likely unfair dismissal on procedural grounds. The file shows a 2-year gap with no documented follow-up, no PIP, no intermediate warnings. The process appears punitive, not progressive.',
   law:'Employment Act 1955, Section 14; Industrial Relations Act 1967',
   takeaway:'Every verbal conversation about performance or conduct → brief contemporaneous note, dated, filed. Every formal step → signed, acknowledged, filed. The paper trail is your entire defence.'},
],

'redundancy': [
  {id:'r1', title:'What Makes a Retrenchment Valid?',
   intro:"Not every cost-cutting exercise qualifies as legitimate retrenchment — courts look at whether the role was genuinely made redundant.",
   concept:'Retrenchment is termination due to genuine redundancy — the role ceases to exist.',
   rule:'Grounds: ceasing operations, role made redundant by restructuring/technology, reduced business operations. Financial difficulty alone is insufficient — the role must be genuinely redundant.',
   explanation:'The classic test: was the role eliminated, or was the person replaced? If the same role reappears under a different title within a few months, it was not redundancy.',
   why:'Retrenchment bypasses misconduct-based dismissal framework. Without strict requirements, employers could misuse it.',
   hrbp:'Document the business case. Show the org chart before and after. Demonstrate that functions are redistributed, not recreated.',
   mistakes:['Retrenching someone and rehiring for the same role 3 months later','Using "restructuring" as a cover for targeted dismissal'],
   scenario:'Head of Branding retrenched. 3 months later: job ad for "Brand Director" with identical responsibilities. Risk? Answer: Very high. The role was not made redundant — the person was replaced.',
   law:'Employment Act 1955, Section 60J and Second Schedule; Code of Conduct for Industrial Harmony 1975',
   takeaway:'Retrenchment = role elimination, not person elimination. The org chart must tell the story. Document everything.'},

  {id:'r2', title:'LIFO — Last-In-First-Out',
   intro:'A guideline, not a statutory requirement — but deviation must be documented.',
   concept:'LIFO is the recommended selection method in the Code of Conduct for Industrial Harmony (1975): retrench those with shortest service first.',
   rule:'Not statutory — courts accept deviations if there are objective documented justifications: skills required to be retained, performance records, specialised knowledge.',
   explanation:'Retrenching senior employees to save on higher termination benefits, while keeping juniors, is high risk and legally questionable.',
   why:'LIFO provides an objective, defensible selection method that reduces perception of bias.',
   hrbp:'Create a LIFO analysis table: role category, employees in that category, service length, reason for selection/retention. Deviation → document the justification.',
   mistakes:['No LIFO analysis documentation for retrenchment selection','Retrenching senior employees (higher benefits) without documented justification'],
   scenario:'Company retrenches 2 junior staff, keeps 2 seniors in same category. Junior staff challenge. Outcome? Answer: If no LIFO analysis or documented justification, procedurally unfair.',
   law:'Code of Conduct for Industrial Harmony 1975 (clause 22); Industrial Relations Act 1967',
   takeaway:'Apply LIFO, document it. If deviating, document the objective business reason. Courts expect to see the analysis.'},

  {id:'r3', title:'Form PK — The 30-Day Notice Requirement',
   intro:'Retrenching 15 employees in 2 weeks? HR has missed a critical filing requirement.',
   concept:'Employers must notify the Director General of Labour via Form PK at least 30 days before retrenchment.',
   rule:'EA Section 63: mandatory. File with Jabatan Tenaga Kerja. Also notify PERKESO and EPF so EIS claims can be processed.',
   explanation:'This is a planning constraint — retrenchment cannot be an overnight operational decision from an HR compliance standpoint.',
   why:'Government oversight of retrenchments allows labour authorities to monitor job losses and facilitate redeployment.',
   hrbp:'Build the 30-day Form PK window into any restructuring project plan. Don\'t let Legal tell you retrenchment is approved until HR has confirmed the filing timeline.',
   mistakes:['Filing Form PK on the same day as the retrenchment letter','Not notifying PERKESO, leaving employees unable to file EIS claims promptly'],
   scenario:'Company retrenches 15 staff effective in 2 weeks. Legal clears it. What has HR missed? Answer: The 30-day advance Form PK notice to DG of Labour.',
   law:'Employment Act 1955, Section 63; Employment (Termination and Lay-Off Benefits) Regulations 1980',
   takeaway:'30 days before retrenchment = Form PK filing date. Build it into the project plan from day one.',
   diagram:`<svg viewBox="0 0 320 120" xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif">
  <text x="160" y="16" text-anchor="middle" fill="#dc7a5a" font-size="10" font-weight="700" letter-spacing="1">RETRENCHMENT TIMELINE</text>
  <line x1="20" y1="50" x2="300" y2="50" stroke="#302d28" stroke-width="2"/>
  ${[
    [20,'Day 0','Decision\nMade','#605850'],
    [90,'Day 0','File\nForm PK','#dc7a5a'],
    [185,'Day 30','Earliest\nRetrench Date','#4a9464'],
    [270,'Day 30+','Notify\nPERKESO/EPF','#4878a8'],
  ].map(([x,t,l,col])=>`
    <circle cx="${x}" cy="50" r="5" fill="${col}"/>
    <text x="${x}" y="35" text-anchor="middle" fill="${col}" font-size="8.5" font-weight="600">${t}</text>
    <text x="${x}" y="68" text-anchor="middle" fill="#a09080" font-size="8">${l.split('\\n')[0]}</text>
    <text x="${x}" y="80" text-anchor="middle" fill="#a09080" font-size="8">${l.split('\\n')[1]||''}</text>
  `).join('')}
  <rect x="88" y="38" width="100" height="24" rx="4" fill="rgba(212,146,74,.08)" stroke="#dc7a5a" stroke-width="1" stroke-dasharray="3"/>
  <text x="138" y="54" text-anchor="middle" fill="#dc7a5a" font-size="9" font-weight="600">30-day window</text>
  <text x="160" y="108" text-anchor="middle" fill="#605850" font-size="9">Missing this window = EA Section 63 offence</text>
</svg>`},

  {id:'r4', title:'Protected Employees During Retrenchment',
   intro:'Certain employees trigger heightened scrutiny when selected for retrenchment.',
   concept:'Retrenchment lists that include protected employees require airtight, pre-existing, documented business justification.',
   rule:'High-risk selections: pregnant employees (burden of proof reverses), whistleblowers, employees on medical leave, employees who recently filed complaints.',
   explanation:'Temporal proximity between a complaint/protected status and adverse action creates a strong retaliation inference. The employer must overcome this.',
   why:'Retrenchment must be driven by genuine business needs, not as a tool to remove inconvenient employees.',
   hrbp:'Before finalising any retrenchment list: run a "protected employee check" against the selection criteria. Not to exclude them automatically — but to ensure you can document non-retaliatory grounds.',
   mistakes:['Including a whistleblower in retrenchment 6 weeks after their complaint without clear pre-existing business grounds','Retrenching a pregnant employee as the only person from her department'],
   scenario:'Company retrenches 3 employees. One had raised a harassment complaint 6 weeks prior. Risk? Answer: Very high. Temporal proximity = retaliation inference. Document objective grounds.',
   law:'Industrial Relations Act 1967; Whistleblower Protection Act 2010; Employment Act 1955, Section 41',
   takeaway:'Protected employee + recent complaint + retrenchment = significant legal risk. Pre-existing, documented, objective selection criteria is your only defence.'},
  {id:'r5', title:'Lay-Off vs Retrenchment — Different Entitlements',
   intro:"Being temporarily laid off is different from being retrenched — and comes with its own legal entitlements.",
   concept:'Lay-off = temporary cessation of work due to lack of work. Employment contract continues. Retrenchment = permanent termination due to redundancy.',
   rule:'Laid-off employees are entitled to lay-off benefits after 12 months of continuous service. If lay-off continues beyond 1 month, the employee may elect to treat it as retrenchment.',
   explanation:'Lay-off benefits use the same formula as termination benefits (EA Second Schedule). The employee who elects to treat a lay-off as retrenchment is entitled to the same benefits.',
   why:'Temporary business disruptions should not mean immediate job losses. Lay-off provisions allow employers to retain workforce during downturns while compensating affected workers.',
   hrbp:'COVID-19 experience: many employers used lay-off provisions. Key risk: a lay-off extending beyond 1 month without return-to-work plans triggers employee election rights. Communicate timelines.',
   mistakes:['Not informing laid-off employees of their rights','Lay-off extending beyond 1 month without any communication about return date'],
   scenario:'Factory shuts down for 6 weeks due to floods. Workers sent home with half-pay. Entitlements? Answer: Lay-off benefits after 12 months service. If lay-off exceeds 1 month, employees can elect to treat it as retrenchment.',
   law:'Employment Act 1955, Section 12(3); Employment (Termination and Lay-Off Benefits) Regulations 1980',
   takeaway:'Lay-off ≠ retrenchment. But a lay-off beyond 1 month gives employees election rights for full termination benefits. Keep lay-offs genuinely temporary.'},

  {id:'r6', title:'Voluntary Separation Scheme (VSS) — Design and Risk',
   intro:"A VSS is structured retrenchment with a financial incentive. Voluntary uptake does not mean zero legal risk.",
   concept:'A VSS offers employees a voluntary exit package above statutory minimum as an alternative to forced retrenchment.',
   rule:'All VSS departures should involve a signed settlement deed that explicitly waives all claims under EA and IRA. A generic receipt is insufficient.',
   explanation:'The settlement amount must be meaningfully above what the employee would receive at Industrial Court. Courts will assess adequacy of consideration when evaluating whether the settlement bars further claims.',
   why:'VSS balances business needs with employee welfare. It creates a less adversarial retrenchment process.',
   hrbp:"The settlement deed is your risk management document. Have legal draft it — not HR. Include: full and final settlement, specific dollar amount, waiver of all EA and IRA claims, proper execution.",
   mistakes:['Using a generic "receipt and settlement" form instead of a properly drafted deed','VSS payout below what the employee would receive at Industrial Court — no genuine compromise'],
   scenario:'Employee accepts RM25,000 VSS and signs a generic receipt. 3 months later files unfair dismissal. Barred? Answer: Depends on wording. A generic receipt may not bar an IRA claim. Use a properly drafted deed every time.',
   law:'Employment Act 1955, Second Schedule; Industrial Relations Act 1967 (settlement deeds)',
   takeaway:'VSS deed must: state full and final settlement, waive all specific statutory claims, include adequate consideration, be properly executed. Legal must draft it.'},
  {id:'r7', title:'Retrenchment Alternatives Before Cutting Heads',
   intro:'Courts look more favourably on retrenchments where the employer demonstrably tried alternatives first.',
   concept:'The Code of Conduct for Industrial Harmony 1975 recommends employers explore alternatives to retrenchment before proceeding. These alternatives also reduce the workforce and cost base without the legal and reputational cost of retrenchment.',
   rule:'Alternatives to consider first: hiring freeze, voluntary leave without pay, reduced hours, pay cuts (with consent), redeployment, retraining, and VSS. Document the exploration of alternatives.',
   explanation:'An employer who jumps straight to retrenchment without exploring alternatives faces a tougher time at the Industrial Court. The documentation of alternatives considered and why they were insufficient strengthens the retrenchment case.',
   why:'Retrenchment has significant welfare, legal, and community impact. Regulators and courts expect employers to demonstrate genuine necessity.',
   hrbp:'Create a "retrenchment alternative options memo" for every proposed retrenchment. Document: what alternatives were considered, why they were insufficient or rejected, and what financial analysis supports the need for headcount reduction.',
   mistakes:['No documentation of alternatives considered before retrenchment decision','Retrenchment presented as the only option when alternatives were never genuinely explored'],
   scenario:'Company reports 40% revenue decline and immediately retrenches 50 staff. No hiring freeze, no salary cuts, no retraining explored. Risk? Answer: Elevated. Courts expect to see evidence that alternatives were considered. The failure to explore alternatives does not invalidate the retrenchment but weakens the employer\'s position.',
   law:'Code of Conduct for Industrial Harmony 1975; Employment Act 1955',
   takeaway:'Document alternatives explored before retrenchment. Hiring freeze → voluntary measures → pay cuts (with consent) → redeployment → VSS → forced retrenchment as last resort. The paper trail matters.'},

  {id:'r8', title:'Post-Retrenchment Rehiring — The Same-Role Problem',
   intro:'Rehiring into the same role within months of a retrenchment is one of the clearest indicators of an unlawful dismissal.',
   concept:'If an employer retrenches an employee and then fills the same role (even under a different title or through a contractor) within a short period, the Industrial Court will likely find the retrenchment was not genuine redundancy.',
   rule:'No fixed time limit after which rehiring is safe. Courts look at: the similarity of the new role to the retrenched role, the time elapsed, and whether the business circumstances that justified retrenchment have genuinely changed.',
   explanation:'A general rule of thumb: if the same or substantially similar role is filled within 3–6 months post-retrenchment, expect scrutiny. If there is a genuine change in business circumstances, document it explicitly.',
   why:'Retrenchment must be about eliminating the role, not removing the person. Rehiring proves the role was not genuinely redundant.',
   hrbp:'Implement a "post-retrenchment recruitment hold" process: any new headcount in a retrenched role category requires HR director sign-off with a documented business justification note.',
   mistakes:['Retrenching and immediately backfilling with a contractor in the same role','No monitoring of post-retrenchment recruitment against retrenched roles'],
   scenario:'Head of Product retrenched in March. In June, company posts for "Group Product Lead" with nearly identical responsibilities. Retrenched employee sues. Outcome? Answer: Very high risk of unfair dismissal finding. 3 months is very short. The role was not made redundant — it was refilled under a different title.',
   law:'Employment Act 1955; Industrial Relations Act 1967, Section 20',
   takeaway:'Post-retrenchment hiring in the same role = instant legal risk. Require senior HR sign-off before any hire that overlaps with a recently retrenched role. Document changed business circumstances if you do need to rehire.'},
],

'hours': [
  {id:'h1', title:'Maximum Working Hours — The New Limits',
   intro:'45 hours per week (reduced from 48 in 2023) — and a separate 8-hour daily cap.',
   concept:'The EA Amendment 2022 reduced the weekly maximum from 48 to 45 hours, effective January 2023.',
   rule:'Max 8 hours per day. Max 45 hours per week. No more than 5 consecutive hours without a 30-minute break. Daily spread (including breaks) max 10 hours.',
   explanation:'A 9-hour shift, 5 days/week = 45 hours total (legal). But each day exceeds the 8-hour daily maximum by 1 hour — that hour is OT every single day.',
   why:'Protecting workers from overwork. Rest is necessary for health, safety, and productivity.',
   hrbp:'Revise all shift schedules post-2023. Many manufacturing operations ran at 48 hours. Anything over 45 is now an offence.',
   mistakes:['Assuming 45 hrs/week compliance means daily OT compliance','Not updating employment contracts to reflect the reduced weekly maximum'],
   scenario:'9-hour shifts, 5 days/week = 45 hrs/wk. Compliant? Answer: Weekly hours yes. But daily 9 hrs > 8 hr max. 1 hour OT per day must be paid.',
   law:'Employment Act 1955, Section 60A (as amended by EA Amendment 2022)',
   takeaway:'Two caps operate independently: 8 hours/day AND 45 hours/week. Breaching either triggers OT obligations.'},

  {id:'h2', title:'Overtime Pay — Rates You Must Know',
   intro:'OT is not discretionary top-up pay. It is a statutory obligation with specific calculations.',
   concept:'EA Section 60A(3) prescribes mandatory OT rates based on when the work is performed.',
   rule:'Normal workday OT: 1.5× hourly rate | Rest day OT: 2× daily rate (full day) | Public holiday OT: 3× daily rate | Max OT: 104 hours/month.',
   explanation:'Hourly rate = monthly wages ÷ (working days × 8). The 104-hour monthly OT cap is frequently breached in manufacturing. Breaching it is an offence even with employee consent.',
   why:'Premium rates create a financial disincentive for employers to overwork staff.',
   hrbp:'Employee earning RM2,600/month, 26 working days, works 2 extra hours on Tuesday. Hourly rate = RM2,600 ÷ (26×8) = RM12.50. OT = 1.5 × RM12.50 = RM18.75/hr × 2 = RM37.50.',
   mistakes:['Paying flat overtime rates not based on the statutory formula','Missing the 104-hour monthly cap and continuing to schedule OT'],
   scenario:'RM2,600/month, 2 extra hours on a Tuesday. OT pay? Answer: RM37.50.',
   law:'Employment Act 1955, Section 60A(3)',
   takeaway:'OT formula: (monthly wages ÷ 26 ÷ 8) × OT rate multiplier × hours. For public holidays: daily rate × 3. Never mix up rest day (2×) with public holiday (3×).'},

  {id:'h3', title:'Flexible Work Arrangements (FWA) — The 60-Day Rule',
   intro:'Since 2023, employers cannot ignore FWA requests. A 60-day response obligation applies.',
   concept:'EA Section 60P (2022 Amendment) gives employees the right to formally request FWA. Employers must respond.',
   rule:'Employee submits written FWA request. Employer must respond in writing within 60 days: approve, conditionally approve, or refuse with written grounds.',
   explanation:'Refusal must state genuine business reasons. A blanket "not suitable" without explanation risks the employee challenging the refusal. The FWA process does not override existing contractual terms.',
   why:'Post-pandemic, flexible work became an expectation. Formalising the process protects both employer and employee interests.',
   hrbp:'Build a documented FWA evaluation workflow in your HRMS. Track request date. Set 60-day calendar reminder on receipt. Draft written grounds for any refusal.',
   mistakes:['Ignoring FWA requests entirely (violation of EA)','Responding after 60 days (separate violation)','Refusing without written grounds (third violation)'],
   scenario:'Employee requests 4 WFH days. Company takes 3 months, eventually refuses without written reasons. Violations? Answer: Two separate EA violations — 60-day breach and no written grounds.',
   law:'Employment Act 1955, Section 60P (inserted by EA Amendment 2022)',
   takeaway:'60 days. In writing. With grounds if refusing. Three rules. All mandatory.'},
  {id:'h4', title:'Overtime Eligibility — Not Everyone Qualifies Under EA',
   intro:"OT rates under the EA apply only to employees below the RM4,000 threshold or manual workers. Above that, it is contractual.",
   concept:'EA overtime provisions apply to employees earning RM4,000/month or below, and to all workmen (manual workers) regardless of salary.',
   rule:'Employees above RM4,000 in non-manual roles have no automatic EA OT entitlement. Whether they get OT pay depends entirely on their employment contract.',
   explanation:'Many companies extend OT to non-EA employees by policy — a generous practice, not a legal requirement. Senior employees with results-based roles typically have no OT entitlement.',
   why:"The EA's OT protections were designed for hourly and lower-wage workers. High-income professionals are presumed to negotiate compensation that accounts for long hours.",
   hrbp:"When drafting contracts for non-EA employees, state clearly whether OT is applicable and at what rate. Silence creates ambiguity. Consider 'time off in lieu' (TOIL) instead.",
   mistakes:['Providing OT to non-EA employees through inconsistent practice, creating contractual entitlement','Not clarifying OT in the employment contract for borderline salary levels'],
   scenario:'Manager, RM7,000/month, demands OT pay for working late on a product launch. Contract silent on OT. Entitled? Answer: Not under the EA — salary exceeds threshold. OT depends entirely on the contract. No mention = no entitlement for professional roles.',
   law:'Employment Act 1955, Section 60A; Section 2 (definition of workman)',
   takeaway:'OT entitlement: EA covers ≤RM4,000 and all manual workers. Above that: contract governs. Always address OT explicitly in senior employee contracts.'},

  {id:'h5', title:'Shift Work — Special Hour and OT Rules',
   intro:"Shift workers have different hour and overtime rules compared to standard 8-to-5 employees.",
   concept:'In a continuous 3-shift operation (24-hour rotation), normal hours are averaged over a cycle, not calculated daily.',
   rule:'Night shifts (10 PM–5 AM): cannot exceed 8 hours without OT rates. Rest days still apply: 1 day per week as designated by roster. Rosters must be communicated in advance.',
   explanation:'Shift allowances are contractual, not statutory. They are typically paid for afternoon/night shifts. The absence of a shift allowance is not automatically unlawful — it depends on the contract.',
   why:"Shift work disrupts natural circadian rhythms. The EA's hours provisions acknowledge the physical toll of non-standard schedules.",
   hrbp:'For 24/7 operations: document shift patterns, OT calculation methodology, designated rest days, and roster notice periods. Many payroll errors in shift environments stem from inconsistent tracking.',
   mistakes:['Assuming 12-hour shifts are automatically compliant because the employee agreed to them','No documented OT calculation methodology for shift workers'],
   scenario:'Nurse on 12-hour night shift claims OT for hours 9–12. Is she entitled? Answer: Yes. First 8 hours at normal rate. Hours 9–12 are OT at 1.5× on a normal workday. Shift length alone does not remove OT entitlement.',
   law:'Employment Act 1955, Sections 60A, 60C; Employment (Limitation of Overtime Work) Regulations 1980',
   takeaway:'12-hour shifts do not mean 12 hours at normal rate. 8-hour daily maximum applies regardless of shift length. Document OT methodology explicitly for shift workers.'},
  {id:'h6', title:'Rest Day vs Public Holiday — Calculating the Right Rate',
   intro:'Paying a rest day rate for public holiday work is one of the most common payroll compliance errors in Malaysia.',
   concept:'Rest day work (2× daily rate) and public holiday work (3× daily rate) carry different pay obligations. Mixing them up creates systematic underpayment.',
   rule:'Rest day: employee works on their designated weekly rest day = 2× ordinary daily rate (for a full day). Public holiday: employee works on a gazetted PH = 3× ordinary daily rate. These rates do not overlap — a public holiday that falls on a rest day = 3× rate, not 2×.',
   explanation:'The substitute holiday rule: if a PH falls on a rest day, the next working day is the substitute holiday. Work on that substitute day = 3× rate. There is no situation where working on a day that was a PH or substitute PH triggers only the 2× rest day rate.',
   why:'Public holidays are nationally designated days — the 3× premium recognises the higher social significance of these days.',
   hrbp:'Audit your payroll system: pull the last 12 months of rest day and public holiday OT payments. Check whether any PH payments were calculated at 2× instead of 3×. The error is systematic if the payroll code uses one rate for both.',
   mistakes:['Payroll system configured with one "overtime" rate for all non-working days','Telling employees who worked on Hari Raya that they get "rest day rate" (2×) when they are entitled to public holiday rate (3×)'],
   scenario:'Employee works on 31 August (National Day, compulsory PH). Daily rate RM100. Pay for that day? Answer: RM100 × 3 = RM300. Not RM200. Not RM150. RM300.',
   law:'Employment Act 1955, Sections 60D and 60',
   takeaway:'Rest day = 2×. Public holiday = 3×. PH on rest day = 3×. No exceptions. Run a payroll audit on all PH and rest day payments in the last 12 months.'},

  {id:'h7', title:'Working Hours for Sales and Field Staff',
   intro:'Sales and field staff often work irregular hours. How do overtime obligations apply when hours are impossible to track precisely?',
   concept:'EA overtime obligations apply to all EA-covered employees, including those whose working patterns are irregular. The challenge is measurement and enforcement for field-based roles.',
   rule:'EA-covered field staff (earning ≤RM4,000) are entitled to overtime for hours worked beyond the daily/weekly maximum. "We can\'t monitor the hours" is not a legal defence.',
   explanation:'Options for managing this: (1) Set a standard hours framework and track via mileage/customer visits, (2) Include allowances that fairly reflect the reality of irregular hours (but document the basis), (3) Reclassify to non-EA if salary justifies it.',
   why:'The EA does not exempt field staff from overtime obligations just because hours are hard to track. The obligation is the employer\'s to manage.',
   hrbp:'For field sales earning ≤RM4,000: either implement a system to approximate hours worked or structure the compensation package such that: (a) the employee earns above RM4,000 (removing EA coverage) or (b) the commission/allowance structure fairly compensates for irregular hours with the employee\'s agreement.',
   mistakes:['Assuming field sales staff are exempt from EA OT because their hours are self-managed','No time tracking system for field staff — making it impossible to calculate compliance'],
   scenario:'EA-covered field sales executive regularly works 50+ hours/week. No OT paid. Claim? Answer: Valid OT claim. "Field staff" is not an EA exemption. The employer must demonstrate how hours were managed or pay the difference.',
   law:'Employment Act 1955, Section 60A',
   takeaway:'Field staff ≤RM4,000 are EA-covered and entitled to OT. Build a framework for tracking hours or structure compensation to avoid the ambiguity. "We can\'t track it" is not a legal defence.'},
],

'maternity': [
  {id:'mat1', title:'98 Days Maternity — Calendar Days, Not Working Days',
   intro:'One of the most common HRMS misconfiguration errors in Malaysia.',
   concept:'Maternity leave is 98 consecutive calendar days — weekends and public holidays are included.',
   rule:'98 calendar days ≈ 14 weeks. Not 98 working days (≈ 20 weeks). Can begin up to 30 days before expected delivery. Late delivery does not extend the period.',
   explanation:'Starting 1 March → ending 7 June, regardless of when the baby arrives. Many HRMS systems default to working days. Test your configuration.',
   why:'Maternity leave covers both pre-natal rest and postnatal recovery.',
   hrbp:'Calendar days — this is non-negotiable. If your HRMS shows 20 weeks for maternity leave, your configuration is wrong.',
   mistakes:['HRMS configured for working days instead of calendar days','Extending maternity leave because the baby arrived late'],
   scenario:'Maternity starts 1 March (30 days early). Baby arrives 10 April. Leave ends? Answer: 7 June — 98 calendar days from 1 March. Delivery date irrelevant.',
   law:'Employment Act 1955, Section 37(1A)',
   takeaway:'98 calendar days. Starts when it starts. Weekends count. Public holidays count. Test your HRMS now.'},

  {id:'mat2', title:'Dismissal During Pregnancy — Reversed Burden',
   intro:'Dismissing a pregnant employee is one of the only areas where the burden of proof reverses onto the employer.',
   concept:'EA Section 41 makes it an offence to dismiss or give notice of dismissal to a pregnant employee eligible for maternity allowance — unless the employer proves non-pregnancy grounds.',
   rule:'Employee does NOT have to prove pregnancy was the reason for dismissal. Employer must prove it was NOT. This reversal is rare in Malaysian employment law.',
   explanation:'Retrenching a pregnant employee is not impossible — but the documentation must be pristine, pre-existing, and clearly disconnected from the pregnancy.',
   why:'Pregnancy discrimination is a global labour rights concern. The EA prevents commercial convenience from being used to remove pregnant employees.',
   hrbp:'Before terminating any pregnant employee, get legal review. The paper trail for non-pregnancy grounds must pre-date the pregnancy announcement.',
   mistakes:['Retrenching the only pregnant employee in a department','Not having pre-existing, documented business grounds for selection'],
   scenario:'Pregnant employee is the only one retrenched in her department. 7 months pregnant. Risk? Answer: Very high. Employer must prove no pregnancy nexus. Near-impossible without pristine pre-existing documentation.',
   law:'Employment Act 1955, Section 41',
   takeaway:'Burden of proof reverses when a pregnant employee is dismissed. The employer must prove innocence. This is rare — take it extremely seriously.'},
  {id:'mat3', title:'Nursing Breaks — Post-Maternity Rights',
   intro:"Since 2023, employers must facilitate nursing breaks for breastfeeding employees. This is a statutory obligation, not a courtesy.",
   concept:"EA Section 41A (2022 amendment): employers must facilitate nursing breaks for breastfeeding employees. Duration and scheduling is agreed between employer and employee.",
   rule:'Not prescribing exact hours — it is a facilitation obligation. The EA does not mandate a nursing room, but strongly expects one. Denial = possible discrimination and constructive dismissal risk.',
   explanation:'Practical implementation: nursing rooms with basic facilities (refrigerator, sink, seating, privacy). Schedule nursing breaks to minimise operational disruption — but the right itself cannot be denied.',
   why:'Breastfeeding has significant health benefits. Enabling nursing breaks reduces the penalty women face for returning to work after maternity leave.',
   hrbp:'Issue a nursing room policy. Formalise location, access hours, facilities. Communicate during maternity leave return planning. Low cost, high retention impact.',
   mistakes:['Denying nursing breaks because it disrupts the work schedule','No designated nursing room — sharing bathrooms or storage rooms is inadequate'],
   scenario:"Returning mother requests 2 × 30-minute nursing breaks per day. Manager says it's too disruptive. HR advice? Answer: Facilitate. The right cannot be denied. Work with manager and employee on timing.",
   law:'Employment Act 1955, Section 41A (inserted by EA Amendment 2022)',
   takeaway:'Nursing breaks: facilitation is mandatory. Work with the employee on timing. Denying nursing breaks is a potential EA offence and discrimination claim.'},

  {id:'mat4', title:"Maternity Allowance — Who Qualifies and Who Doesn't",
   intro:"98 days of leave is the entitlement. But paid maternity leave (maternity allowance) has separate eligibility conditions.",
   concept:'Maternity allowance (paid maternity leave) is not automatic — it requires meeting specific service conditions.',
   rule:'Conditions for paid maternity leave: (1) worked at least 90 days in the 9 months before delivery, (2) worked at least 1 day in the 4 months before delivery, (3) must not be her 5th surviving child or more.',
   explanation:"If she resigns while pregnant (and serves notice), she may still qualify for maternity allowance if she met the service conditions while employed. Resignation alone does not forfeit the allowance.",
   why:'Prevents employees from resigning early but still claiming maternity allowance from a former employer while having left the workforce.',
   hrbp:"The '5th surviving child' rule is based on surviving children — deceased children don't count toward the 5. 'Surviving' means alive at the time of the new delivery.",
   mistakes:['Denying maternity allowance to an employee who resigned during pregnancy if she met service conditions','Misapplying the 5th child rule by counting deceased children'],
   scenario:'Employee resigns at 6 months pregnant, serving 3-month notice. Does she qualify for paid maternity leave? Answer: Likely yes — if she met the 90-day and 1-day conditions from this employer. Resignation alone does not forfeit the allowance.',
   law:'Employment Act 1955, Sections 37–41',
   takeaway:'Maternity allowance: 90 days in 9 months + 1 day in 4 months + not the 5th+ surviving child. Resignation does not automatically forfeit the allowance.'},
  {id:'mat5', title:'Flexible Return-to-Work After Maternity Leave',
   intro:'A flexible return-to-work programme is both a legal risk management tool and a retention strategy.',
   concept:'Employees returning from maternity leave have the right to request FWA under the EA 2022 amendment. They also have protections against adverse action tied to their maternity or recent pregnancy.',
   rule:'Any adverse action (role change, salary cut, removal of responsibilities) on return from maternity leave that is connected to the maternity leave = possible discrimination and constructive dismissal.',
   explanation:'A structured return-to-work programme — phased hours, clear role confirmation, check-in meetings — protects the employer by demonstrating good faith and protects the employee.',
   why:'Maternity returnees are a high-attrition group. A structured, supportive return reduces early attrition of experienced talent.',
   hrbp:'Build a return-to-work checklist: written confirmation of role and salary before return, manager briefing, 30-day check-in, FWA conversation. Track maternity returnee attrition separately — it should not spike in the 6 months post-return.',
   mistakes:['Role changes on return described as "restructuring" that happened to coincide with maternity leave','No pre-return conversation — employee arrives back to find her role has been absorbed'],
   scenario:'Employee returns from 98-day maternity leave to find her team has been reorganised under a male colleague who was her peer. Her role now reports to him. Action? Answer: This is extremely high-risk adverse action linked to maternity leave. Documented business justification pre-dating the maternity leave notification is needed. Otherwise — constructive dismissal and discrimination exposure.',
   law:'Employment Act 1955, Sections 41, 41A; EA 2022 anti-discrimination provisions',
   takeaway:'Return-to-work = restore original role, salary, and responsibilities. Any change needs to be documented as pre-existing and unrelated to the maternity leave. A structured return programme reduces risk and increases retention.'},
  {id:'mat6', title:'Managing Pregnancy Announcements in the Workplace',
   intro:'How an organisation responds to a pregnancy announcement reveals its actual culture — and creates legal risk if handled poorly.',
   concept:'When an employee announces a pregnancy, HR and management have both legal obligations (non-discrimination, maternity protections) and cultural responsibilities (setting the tone for how the organisation treats family).',
   rule:'Immediate obligations on pregnancy announcement: (1) No adverse action tied to the pregnancy, (2) Begin maternity leave planning, (3) Health and safety review of the role, (4) Communicate entitlements clearly.',
   explanation:'Health and safety dimension (often missed): some roles have physical or chemical hazards that require adjustment during pregnancy. The employer has a duty to assess and mitigate these risks.',
   why:'Pregnancy announcements are a moment of vulnerability — the employee is gauging whether the organisation supports her. The response shapes engagement, intention to return, and loyalty.',
   hrbp:'Create a "pregnancy announcement checklist" for line managers: what to say, what not to say, who to notify (HR), what next steps look like. Train managers before they need it — not after they\'ve said the wrong thing.',
   mistakes:['Manager\'s first response: "How long will you be off?" — focuses on absence, not support','No health and safety review for physically demanding or chemically exposed roles'],
   scenario:'Lab technician announces pregnancy. Her role involves daily chemical exposure. Manager says "I\'m sure it\'s fine." What is HR\'s obligation? Answer: Immediate health and safety assessment. If risks exist, the employer must modify her duties, relocate her, or provide paid leave. "Probably fine" is not a risk assessment.',
   law:'Employment Act 1955, Sections 37–41; Occupational Safety and Health Act 1994',
   takeaway:'Pregnancy announcement → H&S review + entitlements communication + maternity plan. Train managers on what to say. The response at announcement defines the culture more than any policy document.'},
],

'wage': [
  {id:'w1', title:'EPF, SOCSO and EIS — The Statutory Three',
   intro:'Three mandatory contribution schemes — and most HR teams mix up at least one.',
   concept:'EPF (retirement savings), SOCSO (injury/invalidity insurance), and EIS (employment insurance) are all mandatory for eligible employees.',
   rule:'EPF: employee 11%, employer 12–13% based on wage band. SOCSO: two schemes — Employment Injury and Invalidity. EIS: 0.2% each.',
   explanation:'EPF employer rate: 13% for wages ≤ RM5,000; 12% for > RM5,000. EIS covers only involuntary termination. SOCSO Employment Injury scheme covers work accidents and commuting accidents.',
   why:'Social protection infrastructure for the workforce. Mandatory contributions fund retirement, injury protection, and unemployment insurance.',
   hrbp:'EPF employer rate split at RM5,000 wage is frequently misconfigured in payroll systems. Test this threshold explicitly.',
   mistakes:['Using 12% EPF employer rate for all employees regardless of wage band','Confusing SOCSO EIS (injury scheme) with EIS (Employment Insurance System)'],
   scenario:'New Malaysian employee, RM4,800/month basic. EPF deduction? Answer: Employee: 11% × RM4,800 = RM528. Employer: 13% × RM4,800 = RM624.',
   law:'EPF Act 1991; ESSA 1969; EIS Act 2017',
   takeaway:'EPF rate splits at RM5,000. EIS and SOCSO are separate. Report work accidents to PERKESO within 48 hours or SOCSO claims may be rejected.',
   diagram:`<svg viewBox="0 0 320 110" xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif">
  ${[
    ['EPF / KWSP','Retirement savings','11%','12–13%','#4a9464'],
    ['SOCSO / PERKESO','Work injury + invalidity','Varies','Varies','#4878a8'],
    ['EIS','Employment insurance','0.2%','0.2%','#9a5adc'],
  ].map(([n,d,e,er,c],i)=>`
  <rect x="8" y="${10+i*32}" width="304" height="26" rx="5" fill="${c}18" stroke="${c}" stroke-width="1" stroke-opacity=".5"/>
  <text x="16" y="${27+i*32}" fill="${c}" font-size="10.5" font-weight="700">${n}</text>
  <text x="16" y="${36+i*32}" fill="#605850" font-size="9">${d}</text>
  <text x="220" y="${27+i*32}" text-anchor="middle" fill="#a09080" font-size="9">EE: ${e}</text>
  <text x="298" y="${27+i*32}" text-anchor="middle" fill="#a09080" font-size="9">ER: ${er}</text>`).join('')}
</svg>`},

  {id:'w2', title:'Minimum Wage — RM1,500 for All Employers',
   intro:'No size exemption since 2023. Every employer — including hawker stalls — must comply.',
   concept:'The national minimum wage of RM1,500/month applies to all employers in Malaysia regardless of size.',
   rule:'Effective 1 February 2023, the micro-enterprise exemption (under 5 employees) was removed. Minimum wage must be met by basic salary — allowances and commissions do not count.',
   explanation:'Deductions for levy, accommodation, or FOMEMA fees cannot bring the effective net wage below RM1,500. This is a frequent compliance gap for foreign workers.',
   why:'Minimum wage floors protect the lowest-income workers from exploitative wage levels.',
   hrbp:'Audit all positions — including foreign workers — for minimum wage compliance. Net take-home after deductions must still meet RM1,500.',
   mistakes:['Counting allowances toward the RM1,500 threshold','Deducting levy fees from wages, bringing effective pay below minimum'],
   scenario:'Foreign worker paid RM1,500/month but RM300 levy + RM50 accommodation deducted. Net: RM1,150. Compliant? Answer: No. Net pay below minimum wage regardless of deduction reason.',
   law:'Minimum Wages Order 2022; National Wages Consultative Council Act 2011',
   takeaway:'RM1,500 minimum basic salary. All employers. No exemptions. Net pay after deductions must remain at or above RM1,500.'},
  {id:'w3', title:'EIS — Employment Insurance Scheme in Practice',
   intro:"EIS is not just a contribution you make. It provides job search allowance, retraining, and career support for retrenched employees.",
   concept:"EIS (Sistem Insurans Pekerjaan) was established under the Employment Insurance System Act 2017. Contribution: 0.2% employee + 0.2% employer.",
   rule:'EIS benefits for retrenched employees: Job Search Allowance (80% of wages Month 1, declining over 6 months), Early Re-employment Allowance, career counselling via SITec portal.',
   explanation:'Eligibility: must have contributed for at least 12 months in the 24 months before termination. EIS covers involuntary termination only — not resignations.',
   why:'EIS provides income support during job transitions, reducing the financial panic that leads to workers accepting poor re-employment immediately.',
   hrbp:"When processing retrenchments: provide the employee with their EIS account details and guide them through the SITec portal. The employee must file within 60 days. This is HR's responsibility to communicate.",
   mistakes:['Not informing retrenched employees about EIS claims','Employee missing the 60-day filing window because HR didn\'t communicate it'],
   scenario:'Employee with 14 months EIS contributions is retrenched. Maximum EIS benefit? Answer: She qualifies (12+ months). Month 1 = 80% of insured wages. She must file at EIS.perkeso.gov.my within 60 days.',
   law:'Employment Insurance System Act 2017; EIS Regulations 2017',
   takeaway:'EIS filing window: 60 days from termination. Communicate this to every retrenched employee. Provide account details. File SITec notification promptly.'},

  {id:'w4', title:'SOCSO — Two Schemes, Different Coverage',
   intro:"SOCSO has two separate schemes. Most HR practitioners mix them up. This causes rejected claims.",
   concept:"SOCSO administers two schemes: Employment Injury (EI) scheme and Invalidity scheme. They cover different risks and have different eligibility.",
   rule:'EI scheme: covers work accidents, accidents commuting to/from work, and occupational diseases. Invalidity scheme: covers permanent disability or death due to non-work causes. Employees 60+ contribute only to EI.',
   explanation:'Employers must report work accidents to PERKESO within 48 hours. Failure to report delays or bars claims. Even minor incidents must be reported.',
   why:'Workplace injuries and disability can be financially catastrophic. SOCSO provides a social safety net.',
   hrbp:"Build an internal 'first report of accident' form. Require supervisors to escalate ALL workplace injuries to HR immediately — even minor ones. 48 hours goes fast.",
   mistakes:['Applying hospitalisation leave to a workplace accident instead of initiating SOCSO claim','Missing the 48-hour accident reporting deadline, causing claim rejection'],
   scenario:'Employee slips in company parking lot walking in and fractures her wrist. Which SOCSO scheme? Answer: Employment Injury — accidents commuting to/from work are covered. Report within 48 hours.',
   law:"Employees' Social Security Act 1969; SOCSO Contribution Table",
   takeaway:'Work accident → EI scheme → report within 48 hours. Non-work disability → Invalidity scheme. Never miss the 48-hour accident reporting window.'},

  {id:'w5', title:'EPF — Common Calculation Errors',
   intro:"EPF contribution rates differ by age, employment type, and salary band. Errors are common and create audit risk.",
   concept:'EPF contribution rates: Employee 11% (all ages < 60). Employer: 13% for wages ≤ RM5,000; 12% for wages > RM5,000. Employees 60+: Employee 0%, Employer 4%.',
   rule:'Non-citizens: Employee 11%, Employer RM5 (statutory minimum). Late EPF payments incur dividend losses — employer is liable for the dividend the employee would have earned.',
   explanation:'The RM5,000 wage threshold for employer rate is frequently misconfigured in payroll systems. Test this boundary explicitly with your HRMS.',
   why:'EPF is Malaysia\'s mandatory retirement savings scheme. Consistent contributions over a working life build retirement funds — underpayment has compounding effects.',
   hrbp:'Run a payroll configuration audit: test employee with salary exactly RM5,000, RM4,999, and RM5,001. Verify employer rates split correctly at the threshold.',
   mistakes:['Using 12% employer rate for all employees regardless of salary band','Late EPF payment without accounting for dividend loss liability'],
   scenario:'New Malaysian employee, RM4,800/month basic. EPF deduction? Answer: Employee: 11% × RM4,800 = RM528. Employer: 13% × RM4,800 = RM624. Total = RM1,152/month.',
   law:'Employees Provident Fund Act 1991; EPF Contribution Table',
   takeaway:'Employer EPF rate: 13% (wages ≤ RM5,000), 12% (wages > RM5,000). Employee always 11% (< 60). Test your HRMS at the threshold boundary.'},
  {id:'w6', title:'Salary Deductions — What Is and Is Not Permitted',
   intro:'Deducting from an employee\'s salary without authority is an EA offence, even if the employee caused a loss.',
   concept:'EA Section 24 sets out the only permitted deductions from wages. Any deduction not listed is unlawful, regardless of whether the employee "agrees" to it.',
   rule:'Permitted deductions: overpayment of wages, EPF/SOCSO/EIS contributions, court-ordered deductions, absence from work, damage caused by employee\'s negligence (with limitations), and advances repayment (with limits). NOT permitted: arbitrary penalties, uniform costs that bring pay below minimum wage, "fine" systems.',
   explanation:'"But he agreed to the deduction" — employee consent does not override the EA. If the deduction is not within the permitted list, consent does not make it lawful.',
   why:'Wage security is foundational. Permitting arbitrary deductions would undermine the minimum wage floor and enable exploitation.',
   hrbp:'Build a deductions approval process: any non-standard deduction requires HR sign-off against the EA permitted list. Never implement a disciplinary "fine" system — it is almost certainly unlawful.',
   mistakes:['Deducting for damage or breakage without following the EA procedure (and limits)','Systems where managers impose "fines" for lateness or errors — these are unlawful salary deductions'],
   scenario:'Employee damages a company vehicle. Company deducts full repair cost (RM3,000) from one month\'s salary. Lawful? Answer: Partially. Deduction for employee-caused damage is permitted by EA, but there are limits and a process requirement. A single month deduction of RM3,000 may bring pay below minimum wage — that is unlawful.',
   law:'Employment Act 1955, Section 24',
   takeaway:'Permitted deductions list is exhaustive. Employee consent does not expand it. Never implement fine/penalty systems — they are unlawful salary deductions. Check deductions against the EA list before implementing.'},

  {id:'w7', title:'Bonus Structures — Legal Obligations and Pitfalls',
   intro:'Whether a bonus is contractual or discretionary determines whether an employee can sue for it.',
   concept:'Bonuses are contractual if: the contract promises them, company policy commits to them, or consistent payment over time has made them an implied term. Discretionary bonuses are at the employer\'s genuine discretion.',
   rule:'A contractual bonus cannot be withheld or reduced without the employee\'s consent. A discretionary bonus can be varied or withheld — but the discretion must be exercised genuinely, not capriciously.',
   explanation:'Courts have found that even "discretionary" bonuses cannot be withheld in bad faith. If a manager withholds a bonus to punish an employee for raising a complaint, that is a wrongful exercise of discretion.',
   why:'Bonus structures create significant expectations. Getting the contractual vs discretionary distinction right protects the employer\'s flexibility.',
   hrbp:'Annual performance bonuses described as "discretionary" in contracts but paid every year at similar rates may be found to be contractual. To maintain genuine discretion: vary the amount year to year, explicitly communicate the discretionary nature, and document the review process.',
   mistakes:['Promising bonuses in offer letters without qualifying them as discretionary','Withholding a discretionary bonus for an improper reason (retaliation, pregnancy) — this is a wrongful exercise of discretion'],
   scenario:'Employee\'s offer letter says "you will receive an annual bonus of 1 month\'s salary subject to performance." She achieves all her KPIs. Company refuses to pay bonus due to "poor financial results." Entitled to bonus? Answer: The offer letter language ("will receive") suggests a contractual entitlement. "Subject to performance" has been satisfied. The financial results caveat was not in the contract — she may well be entitled to it.',
   law:'Contracts Act 1950; implied terms doctrine; Employment Act 1955',
   takeaway:'Use precise language: "may receive" (discretionary) vs "will receive" (contractual). Draft all bonus provisions with explicit conditions. Never withhold a bonus for improper reasons even if it is labelled discretionary.'},
  {id:'w8', title:'Payroll Reconciliation — Catching Errors Before They Compound',
   intro:'A payroll error that is not caught in month one becomes 12 errors by year end. Monthly reconciliation is not optional.',
   concept:'Payroll reconciliation is the process of verifying that payroll outputs match the inputs and expectations — headcount, salary grades, deductions, and statutory contributions are all as they should be.',
   rule:'Monthly reconciliation checks: headcount (who is on payroll vs who should be), gross pay movement analysis (who changed and by how much vs approved changes), statutory deductions (EPF, SOCSO, EIS, PCB — are rates correct?), and bank file vs payslip totals.',
   explanation:'The most common undetected errors: terminated employees still on payroll ("ghost employees"), EPF rate threshold errors, OT calculations for shift workers, and leave encashment errors on exit.',
   why:'Payroll errors cause employee distress, EA violations (underpayment), and EPF/SOCSO/LHDN audit exposure if not caught and corrected quickly.',
   hrbp:'Build a monthly payroll sign-off checklist: payroll manager signs off on all reconciliation checks before payroll is approved for payment. Every variance from the prior month must have a documented explanation.',
   mistakes:['No monthly reconciliation — errors discovered in the annual audit or worse, when an employee complains','Approving payroll without reviewing the variance report'],
   scenario:'Payroll is approved and paid. Finance audit 3 months later discovers an employee terminated in January is still receiving salary. 3 months of overpayment. Recovery options? Answer: Overpayment can be recovered but requires the employee\'s agreement on the repayment plan. The EA limits how much can be deducted per month. Prevention: monthly reconciliation.',
   law:'Employment Act 1955, Section 24 (deductions); EPF Act 1991',
   takeaway:'Monthly payroll reconciliation: headcount, grade changes, deductions, statutory rates. Sign-off before payment. Every variance needs an explanation. Catch errors in month one, not year end.'},
],

'foreign': [
  {id:'f1', title:'Work Permit Categories',
   intro:'Different visa types for different skill levels — and mixing them up is an immigration offence.',
   concept:'Malaysia\'s work permit system has distinct categories: Employment Pass (skilled, RM5,000+), TEVP (semi/unskilled, approved sectors), and others.',
   rule:'TEVP is employer-specific and sector-specific. A TEVP worker cannot be transferred to another employer or sector without a new permit.',
