<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>HR Playbook — Professional Learning</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0c0b;--bg2:#161513;--bg3:#1e1c19;--bg4:#272420;--bg5:#302d28;
  --tx:#f5f0e8;--tx2:#c8bfb0;--tx3:#8a8078;
  --bdr:rgba(255,255,255,0.07);--bdr2:rgba(255,255,255,0.14);
  --amber:#d4924a;--amber2:#f0b060;
  --green:#4a9464;--blue:#4878a8;--red:#a84848;--purple:#7a58a8;
  --r:14px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth;font-size:16px}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;line-height:1.6;min-height:100vh}
button,a{cursor:pointer;font-family:'Inter',sans-serif}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px}

/* === SCREENS === */
.screen{display:none}.screen.active{display:block}

/* === HEADER === */

.hdr-logo{font-family:'Playfair Display',serif;font-size:15px;color:var(--tx);white-space:nowrap}
.hdr-logo span{color:var(--amber)}
.hdr-search{
  flex:1;display:flex;align-items:center;gap:8px;
  background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rs);
  padding:0 10px;height:34px;
}
.hdr-search input{flex:1;background:none;border:none;outline:none;color:var(--tx);font-size:13.5px;font-family:'Inter',sans-serif}
.hdr-search input::placeholder{color:var(--tx3)}
.hdr-search .sico{color:var(--tx3);font-size:12px}

/* === BACK BAR (prominent) === */
.back-bar{
  display:flex;align-items:center;gap:0;
  background:var(--bg2);border-bottom:1px solid var(--bdr);
  padding:0;
}
.back-btn-big{
  display:flex;align-items:center;gap:8px;
  padding:11px 16px;
  background:none;border:none;color:var(--tx2);font-size:13px;font-weight:500;
  transition:color .15s;
}
.back-btn-big:hover{color:var(--tx)}
.back-btn-big .arr{font-size:16px;color:var(--amber)}
.back-bar-title{font-size:13px;color:var(--tx3);padding-right:16px;margin-left:auto}

/* === HOME SCREEN === */
.home-hero{
  padding:24px 16px 20px;border-bottom:1px solid var(--bdr);
  position:relative;overflow:hidden;
}
.home-hero::before{
  content:'';position:absolute;top:-60px;right:-80px;
  width:240px;height:240px;border-radius:50%;
  background:radial-gradient(circle,rgba(212,146,74,.1) 0%,transparent 70%);
  pointer-events:none;
}
.hero-tag{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin-bottom:8px}
.hero-h{font-family:'Playfair Display',serif;font-size:28px;line-height:1.2;color:var(--tx);margin-bottom:6px}
.hero-h em{color:var(--amber);font-style:italic}
.hero-p{font-size:13px;color:var(--tx2);line-height:1.65;margin-bottom:16px}
.hero-stats{display:flex;gap:18px}
.hstat{display:flex;flex-direction:column;gap:1px}
.hstat-n{font-family:'Playfair Display',serif;font-size:22px;color:var(--tx)}
.hstat-l{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3)}

/* === PROGRESS === */
.prog-strip{padding:12px 16px;border-bottom:1px solid var(--bdr)}
.prog-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.prog-label{font-size:11px;color:var(--tx3)}
.prog-pct{font-size:11px;color:var(--amber);font-weight:600}
.prog-track{height:3px;background:var(--bg5);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--amber);border-radius:2px;transition:width .5s}
.prog-meta{display:flex;gap:14px;margin-top:8px}
.pmeta{display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--tx3)}
.pmeta-dot{width:6px;height:6px;border-radius:50%}

/* === SECTION LABEL === */
.sec-lbl{padding:14px 16px 8px;font-size:9.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--tx3)}

/* === CATEGORY GRID === */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:0 16px}
.ccard{
  background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);
  padding:13px;cursor:pointer;transition:border-color .15s,transform .1s;
  position:relative;overflow:hidden;
}
.ccard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ca);opacity:.9}
.ccard:active{transform:scale(.97)}
.ccard-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:7px}
.ccard-icon{font-size:20px;line-height:1}
.ccard-count{font-size:10px;font-weight:700;color:var(--ca);background:rgba(255,255,255,.06);padding:2px 6px;border-radius:8px}
.ccard-name{font-size:12.5px;font-weight:600;color:var(--tx);line-height:1.35;margin-bottom:7px}
.ccard-pb{height:3px;background:var(--bg5);border-radius:2px;overflow:hidden}
.ccard-pf{height:100%;border-radius:2px;transition:width .4s}

/* === TOPIC LIST (category screen) === */
.tlist{padding:4px 0}
.titem{
  display:flex;align-items:flex-start;gap:10px;
  padding:13px 16px;border-bottom:1px solid var(--bdr);
  cursor:pointer;transition:background .12s;
}
.titem:hover{background:var(--bg2)}
.titem-num{font-size:10px;font-weight:700;color:var(--tx3);min-width:20px;margin-top:3px;text-align:right;flex-shrink:0}
.titem-body{flex:1;min-width:0}
.titem-title{font-size:14px;font-weight:600;color:var(--tx);line-height:1.35;margin-bottom:3px}
.titem-intro{font-size:12.5px;color:var(--tx3);font-style:italic;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.titem-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.rdot{width:8px;height:8px;border-radius:50%;background:var(--bg5);margin-top:3px;flex-shrink:0}
.rdot.read{background:var(--green)}
.rdot.bkm{background:var(--amber)}
.titem-arr{font-size:12px;color:var(--tx3)}

/* === READING PAGE === */
.reading-wrap{padding:0}
.reading-hero{
  padding:20px 16px 16px;border-bottom:1px solid var(--bdr);
  position:relative;
}
.reading-cat-tag{
  display:inline-flex;align-items:center;gap:6px;
  font-size:10.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--tx3);margin-bottom:10px;
}
.reading-cat-tag .dot{width:6px;height:6px;border-radius:50%}
.reading-title{font-family:'Playfair Display',serif;font-size:22px;line-height:1.25;color:var(--tx);margin-bottom:8px}
.reading-intro{font-size:13.5px;color:var(--tx2);line-height:1.7;font-style:italic}

/* === READING ACTIONS (sticky at bottom) === */
.reading-actions{
  position:sticky;
  bottom:60px;
  z-index:50;
  background:rgba(13,12,11,0.99);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--bdr2);
  border-bottom:1px solid var(--bdr);
  padding:10px 16px;
  display:flex;
  align-items:center;
  gap:8px;
  /* Ensure it never exceeds the column */
  max-width:720px;
  width:100%;
  /* On desktop the app-shell is 720px so this is already correct.
     The transform trick was causing the misalignment. */
}
.btn-read{
  padding:9px 16px;
  background:transparent;color:var(--tx2);
  border:1px solid var(--bdr2);
  border-radius:var(--rs);font-size:12.5px;font-weight:500;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:all .15s;white-space:nowrap;
}
.btn-read:hover{color:var(--tx);border-color:var(--bdr2)}
.btn-read.done{
  background:rgba(74,148,100,.15);border-color:var(--green);
  color:#6ec990;
}
.btn-bkm{
  padding:9px 11px;background:transparent;border:1px solid var(--bdr2);border-radius:var(--rs);
  font-size:16px;transition:all .15s;color:var(--tx3);
}
.btn-bkm.on{background:rgba(212,146,74,.12);border-color:var(--amber);color:var(--amber)}
.btn-nav-prev{
  padding:9px 13px;background:var(--bg3);border:1px solid var(--bdr2);border-radius:var(--rs);
  color:var(--tx2);font-size:14px;font-weight:600;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.btn-nav-prev:hover{color:var(--tx)}
.btn-nav-prev:disabled{opacity:.25;cursor:not-allowed}
.btn-nav-next{
  flex:1;padding:9px 12px;
  background:var(--amber);color:var(--bg);border:none;
  border-radius:var(--rs);font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:4px;
  transition:opacity .15s;min-width:0;
}
.btn-nav-next:hover{opacity:.9}
.btn-nav-next:disabled{opacity:.2;cursor:not-allowed;background:var(--bg4);color:var(--tx3)}

/* === READING CONTENT === */
.rcontent{padding:0}

.rsection{
  padding:16px 16px 0;margin-bottom:0;
  border-bottom:1px solid var(--bdr);
  padding-bottom:16px;
}
.rsection:last-child{border-bottom:none}
.rsec-label{
  font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:var(--amber);opacity:.7;margin-bottom:9px;
  display:flex;align-items:center;gap:7px;
}
.rsec-label::after{content:'';flex:1;height:1px;background:var(--bdr)}
.rsec-body{font-size:14.5px;color:var(--tx);line-height:1.8}
.rsec-body strong{color:var(--amber2);font-weight:600}
.rsec-body em{font-style:italic;color:var(--tx2)}

/* Key points */
.kpts{list-style:none;margin-top:4px}
.kpts li{
  display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--bdr);
  font-size:13.5px;color:var(--tx2);line-height:1.65;
}
.kpts li:last-child{border-bottom:none}
.kpts li strong{color:var(--tx);font-weight:600}
.kpts .pn{font-size:9.5px;font-weight:700;color:var(--amber);min-width:16px;margin-top:5px;flex-shrink:0}

/* Scenario box */
.scenario{
  background:rgba(212,146,74,.06);
  border:1px solid rgba(212,146,74,.18);
  border-left:3px solid var(--amber);
  border-radius:0 var(--rs) var(--rs) 0;
  padding:13px 14px;font-size:14px;color:var(--tx);line-height:1.75;
}
.scenario strong{color:var(--amber2);font-weight:600}
.scenario-ans{
  margin-top:10px;padding-top:10px;border-top:1px dashed rgba(212,146,74,.25);
  font-size:13.5px;color:var(--amber2);font-weight:500;line-height:1.65;
}

/* Law chip */
.lawchip{
  display:inline-block;font-size:12.5px;color:var(--tx2);font-style:italic;
  background:var(--bg3);border:1px solid var(--bdr2);border-radius:6px;padding:7px 12px;line-height:1.6;
}

/* Diagram */
.diagram-wrap{
  background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);
  padding:16px;overflow-x:auto;margin:4px 0;
}
.diagram-wrap svg{max-width:100%;height:auto;display:block;margin:0 auto}

/* Key takeaway */
.takeaway{
  background:rgba(74,148,100,.07);border:1px solid rgba(74,148,100,.2);
  border-radius:var(--r);padding:14px 16px;
  font-size:14px;color:var(--tx);line-height:1.75;
}
.takeaway-lbl{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--green);margin-bottom:7px;opacity:.9}

/* Mistakes */
.mistake-list{list-style:none;background:rgba(168,72,72,.05);border:1px solid rgba(168,72,72,.15);border-radius:var(--rs);padding:4px 12px}
.mistake-list li{
  display:flex;gap:8px;padding:9px 0;border-bottom:1px solid rgba(168,72,72,.1);
  font-size:13.5px;color:var(--tx);line-height:1.65;
}
.mistake-list li:last-child{border-bottom:none}
.mico{font-size:13px;margin-top:2px;flex-shrink:0}

/* === SEARCH RESULTS === */
.search-meta{padding:10px 16px;font-size:12.5px;color:var(--tx3);border-bottom:1px solid var(--bdr)}
.search-meta strong{color:var(--tx2)}

/* === BOOKMARKS SCREEN === */
.empty-state{padding:60px 16px;text-align:center}
.empty-ico{font-size:40px;opacity:.3;margin-bottom:12px}
.empty-msg{font-size:14px;color:var(--tx3);line-height:1.6}

/* === TOPIC NAV STRIP === */
.tnav{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;border-top:1px solid var(--bdr);
  font-size:12px;color:var(--tx3);
}
.tnav strong{color:var(--tx2)}

/* marks */
mark{background:rgba(212,146,74,.25);border-radius:2px;padding:0 1px;color:inherit}

/* spacer */
.spacer{height:14px}

/* ═══════════════════════════════════════════════
   DESKTOP LAYOUT — centered reading column
═══════════════════════════════════════════════ */

/* ── Core shell constraint ── */
.app-shell{
  max-width:720px;
  margin:0 auto;
  min-height:100vh;
  padding-bottom:32px;
  position:relative;
  z-index:1;
}

/* ── Header: full-width bar, centered content ── */
.hdr{
  position:sticky;top:0;z-index:200;
  width:100%;
  background:rgba(13,12,11,0.97);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bdr);
}



/* ── Desktop-specific enhancements ── */
@media(min-width:769px){
  body{
    background:#070605;
  }
  /* Ambient depth on either side of the column */
  body::before{
    content:'';
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    background:radial-gradient(ellipse 60% 100% at 50% 0%, rgba(212,146,74,.04) 0%, transparent 70%);
    pointer-events:none;
    z-index:0;
  }
  .app-shell{
    background:var(--bg);
    box-shadow:
      0 0 0 1px rgba(255,255,255,.05),
      0 0 60px rgba(0,0,0,.8),
      0 0 120px rgba(0,0,0,.5);
  }

}

@media(max-width:768px){
  .app-shell{padding-bottom:24px}
  .hdr-inner{padding:0 14px}
}

/* Toolbar visual alignment — matches content padding */
@media(min-width:769px){
  .reading-actions{
    /* Already constrained by app-shell's 720px max-width.
       Give it the same side padding as content so buttons
       align with the text above. */
    padding:10px 20px;
  }
  .tnav{
    padding:8px 20px;
  }
}

/* === SAVED HERO BUTTON === */
.saved-hero-btn{
  display:flex;flex-direction:column;align-items:center;gap:1px;
  background:rgba(200,80,80,.1);
  border:1px solid rgba(200,80,80,.25);
  border-radius:10px;
  padding:7px 12px;
  cursor:pointer;
  transition:all .15s;
}
.saved-hero-btn:hover{background:rgba(200,80,80,.18);border-color:rgba(200,80,80,.4)}
.saved-ico{font-size:18px;line-height:1;margin-bottom:1px}
.saved-ct{font-family:'Playfair Display',serif;font-size:22px;color:#e07070;line-height:1.1}
.saved-hero-btn .hstat-l{color:#c07070}



/* === UPDATED READING ACTIONS === */
.btn-alltopics{
  padding:8px 13px;
  background:rgba(212,146,74,.14);
  border:1px solid rgba(212,146,74,.35);
  border-radius:20px;
  color:var(--amber2);
  font-size:12px;font-weight:600;
  white-space:nowrap;flex-shrink:0;
  transition:all .15s;
}
.btn-alltopics:hover{background:rgba(212,146,74,.25);border-color:var(--amber2)}
.btn-read{
  padding:9px 12px;
  background:transparent;color:var(--tx3);
  border:1px solid var(--bdr2);
  border-radius:var(--rs);font-size:11.5px;font-weight:600;
  flex-shrink:0;white-space:nowrap;
  transition:all .15s;
}
.btn-read:hover{color:var(--tx)}
.btn-read.done{
  background:rgba(74,148,100,.15);border-color:var(--green);
  color:#6ec990;
}

/* === PERSISTENT SEARCH (below progress, home only) === */
.persistent-search{
  padding:0 16px 14px;
  background:var(--bg);
}
.psearch-inner{
  display:flex;align-items:center;gap:8px;
  background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;
  padding:0 12px;height:36px;max-width:400px;
  transition:border-color .15s;
}
.psearch-inner:focus-within{border-color:var(--bdr2)}
.psearch-inner .sico{color:var(--tx3);font-size:13px;flex-shrink:0}
.psearch-inner input{
  flex:1;background:none;border:none;outline:none;
  color:var(--tx);font-size:13.5px;font-family:'Inter',sans-serif;
}
.psearch-inner input::placeholder{color:var(--tx3)}

/* === INLINE SEARCH RESULTS META === */
.search-meta-inline{
  padding:10px 16px 6px;
  font-size:12.5px;color:var(--tx3);
  border-bottom:1px solid var(--bdr);
}
.search-meta-inline strong{color:var(--tx2)}
</style>
</head>
<body>

<div class="hdr" id="hdr" role="banner">
  <div class="hdr-inner">
    <div class="hdr-logo">HR <span>Playbook</span></div>
  </div>
</div>

<div class="app-shell">
<!-- SCREENS -->
<div class="screen active" id="screen-home">
  <div id="home-static"></div>
  <div id="home-dynamic"></div>
</div>
<div class="screen" id="screen-category"></div>
<div class="screen" id="screen-topic"></div>
<div class="screen" id="screen-bookmarks"></div>
<div class="screen" id="screen-search"></div>

<!-- BOTTOM NAV -->
</div><!-- /app-shell -->

<script>
'use strict';

// ═══════════════════════════════════════════════
// DATA — CATEGORIES & TOPICS
// ═══════════════════════════════════════════════

const CATS = [
  // DOMAIN 1: EMPLOYMENT LAW FOUNDATIONS

  {id:'ir', name:'Industrial Relations & Disputes', icon:'🏛️', accent:'#dc9a5a',

  {id:'talent', name:'Talent Acquisition', icon:'🎯', accent:'#a8dc5a',

  {id:'ld', name:'Learning & Development', icon:'📚', accent:'#5adcb8',

  {id:'hrbp', name:'Strategic HR & HRBP', icon:'🧭', accent:'#5a9adc',

  {id:'culture', name:'Culture, EX & Engagement', icon:'✨', accent:'#dc5a9a',
   desc:'EVP, engagement drivers, psychological safety, DEI, wellbeing.'},
  {id:'hrtech', name:'HR Analytics & Technology', icon:'🤖', accent:'#5adcdc',
   desc:'People analytics, HRMS, dashboards, data-driven decisions.'},
];

const TOPICS = {

'employment-basics': [
  {id:'eb1', title:'Who Does the Employment Act Cover?',
   intro:'The EA does NOT cover all employees — coverage depends on salary and job type.',
   concept:'The Employment Act 1955 (EA) is Malaysia\'s primary labour law, but it has a specific coverage threshold.',
   rule:'The EA automatically covers employees earning RM4,000/month or below. It also covers all "workmen" (manual workers) regardless of salary.',
   explanation:'Above RM4,000, non-manual employees are governed primarily by their employment contract — not EA minimums. This matters for leave, OT, termination benefits, and notice periods.',
   why:'The EA was designed to protect lower-wage workers who have less bargaining power. Higher earners are presumed capable of negotiating their own terms.',
   hrbp:'When an employee earns above RM4,000 in an administrative/professional role, their leave, termination rights, and benefits are governed by their contract — not EA floor. This matters hugely in disputes about OT eligibility or notice periods.',
   mistakes:['Assuming EA applies to all employees regardless of salary','Using EA entitlements as defaults for senior staff contracts — they may not be legally required'],
   scenario:'A Marketing Manager earning RM6,000 claims EA overtime rates. Answer: No — unless her contract explicitly grants this. She is not a "workman" and exceeds the wage threshold.',
   law:'Employment Act 1955, Part I — Sections 2 & 2A; Employment (Amendment) Act 2022',
   takeaway:'Always determine EA coverage before applying statutory minimums. Non-EA employees are contract-governed — their document is the law.',
   diagram:`<svg viewBox="0 0 320 160" xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif">
  <rect x="10" y="10" width="300" height="60" rx="8" fill="#1e1c19" stroke="#d4924a" stroke-width="1.5"/>
  <text x="160" y="34" text-anchor="middle" fill="#f0ebe0" font-size="11" font-weight="600">Employment Relationship</text>
  <text x="160" y="52" text-anchor="middle" fill="#a09080" font-size="10">Is the person an employee?</text>
  <line x1="80" y1="70" x2="60" y2="100" stroke="#605850" stroke-width="1" stroke-dasharray="4"/>
  <line x1="240" y1="70" x2="260" y2="100" stroke="#605850" stroke-width="1" stroke-dasharray="4"/>
  <rect x="10" y="100" width="130" height="50" rx="8" fill="#1a2e20" stroke="#4a9464" stroke-width="1.5"/>
  <text x="75" y="120" text-anchor="middle" fill="#4a9464" font-size="10" font-weight="600">≤ RM4,000/mth</text>
  <text x="75" y="136" text-anchor="middle" fill="#a09080" font-size="9">EA Applies</text>

  {id:'eb2', title:'The 2022 EA Amendment — What Changed?',
   intro:'The most significant overhaul of Malaysian labour law in decades.',
   concept:'The Employment (Amendment) Act 2022 fundamentally updated the EA, effective 1 January 2023.',
   rule:'Key changes: wage threshold raised to RM4,000; 98 days maternity leave; 7 days paternity leave; FWA request rights; expanded sexual harassment obligations; FWA obligations.',
   explanation:'The amendment brought Malaysian labour law closer to ILO standards and post-pandemic workforce expectations. Many obligations are now mandatory where they were previously discretionary.',
   why:'Malaysia\'s labour laws lagged behind modern workforce realities. The amendment modernised the EA to reflect new norms and align with international standards.',
   hrbp:'Review and update all employment contracts, HR policies, and HRMS configurations. The FWA provision alone requires a documented workflow — employers must respond within 60 days.',
   mistakes:['Not updating employment contracts to reflect new EA minimums','Assuming existing policies are still compliant post-January 2023'],
   scenario:'An employee submits a written FWA request. The manager ignores it. What happens? Answer: Since 2023, employers must formally respond within 60 days with approval or written reasons for refusal.',
   law:'Employment (Amendment) Act 2022, gazetted 27 May 2022, effective 1 January 2023',
   takeaway:'The 2022 amendment is not optional. Audit all HR policies against the new EA provisions — especially FWA, sexual harassment, and paternity leave.',
   diagram:`<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif">
  <text x="160" y="22" text-anchor="middle" fill="#d4924a" font-size="11" font-weight="700" letter-spacing="1">2022 EA AMENDMENT KEY CHANGES</text>
  ${[
    ['Wage threshold','RM2,000 → RM4,000/month','#d4924a'],
    ['Maternity leave','60 → 98 calendar days','#4a9464'],
    ['Paternity leave','New: 7 days','#4878a8'],
    ['FWA requests','Right to formally request + 60-day response','#9a5adc'],
    ['Sexual harassment','Mandatory inquiry obligation','#dc7a5a'],
  ].map(([label,val,c],i) => `
  <rect x="10" y="${38+i*30}" width="300" height="24" rx="5" fill="${c}18" stroke="${c}" stroke-width="1" stroke-opacity=".4"/>
  <text x="18" y="${55+i*30}" fill="${c}" font-size="10" font-weight="600">${label}</text>
  <text x="302" y="${55+i*30}" text-anchor="end" fill="#a09080" font-size="10">${val}</text>`).join('')}
</svg>`},

  {id:'eb3', title:"What Counts as 'Wages' Under the EA?",
   intro:"Not everything you pay an employee counts as 'wages' — this matters enormously.",
   concept:'EA defines "wages" narrowly. The definition affects OT rates, termination benefits, maternity allowance, and more.',
   rule:'Wages = basic salary + fixed allowances paid every pay period. Excludes: housing, travel, bonuses, gratuity, overtime itself.',
   explanation:'This means termination benefits, OT calculations, and maternity allowance are calculated on a lower base than total compensation. Getting this wrong is one of the most common HR payroll errors.',
   why:'The narrow definition prevents variable payments from artificially inflating statutory entitlements, while still protecting core income.',
   hrbp:'If an employee earns RM3,500 basic + RM800 travel + RM500 housing, their EA wages = RM3,500. Severance calculations use RM3,500, not RM4,800.',
   mistakes:['Using total CTC instead of EA wages for termination benefit calculations','Including annual bonuses in the wages base for OT rate calculations'],
   scenario:'Employee earning RM2,800 basic + RM500 petrol allowance is retrenched. What is severance based on? Answer: RM2,800 (basic wages only). Petrol allowance excluded.',
   law:'Employment Act 1955, Section 2 (Definition of Wages)',
   takeaway:"Know what's in — and what's out — of EA wages. Calculate all statutory entitlements on wages, not gross salary."},

  {id:'eb4', title:'Probation Period — Rights Still Apply',
   intro:'The EA does not regulate probation — but the Industrial Court absolutely does.',
   concept:'There is no statutory probation period in Malaysia. Duration is set by contract. But probationers still have IR Act protections.',
   rule:'Probationers cannot be dismissed "at will". They have the right not to be dismissed without just cause under the IRA 1967.',
   explanation:'The Industrial Court has consistently held that probationers must receive fair evaluation and opportunity to improve before termination.',
   why:'Probation is a trial period — not a loophole. Courts protect employees from arbitrary probationary dismissal.',
   hrbp:'Document performance issues during probation. Conduct mid-point reviews. Give written feedback. Only terminate at end of probation with documented grounds.',
   mistakes:['"We can let go of probationers anytime" — the Industrial Court rejects this','Extending probation without communicating it in writing'],
   scenario:'A probationer is terminated because the manager "doesn\'t like her style." No documentation exists. Risk? Answer: High. Industrial Court will likely find unfair dismissal.',
   law:'Industrial Relations Act 1967, Section 20',
   takeaway:'Treat probation like a structured PIP. Document everything. The Industrial Court expects fair process regardless of probationary status.'},

  {id:'eb5', title:'Employee vs Independent Contractor',
   intro:"Calling someone a 'contractor' doesn't make them one legally.",
   concept:'Malaysian courts use the "control test" and other factors to determine employment status — not just contract labels.',
   rule:'If you control how the work is done, integrate the person into your business, and they bear no financial risk — they are likely an employee, regardless of any "contractor" agreement.',
   explanation:'Misclassification exposes employers to backdated EPF, SOCSO, EIS, EA leave entitlements, and unfair dismissal claims. Even with a signed contractor agreement, courts can reclassify.',
   why:'The law protects workers from being denied statutory benefits through contractual sleight of hand.',
   hrbp:'If KWSP audits and reclassifies 10 long-term contractors as employees, you owe years of backdated EPF contributions plus penalties. Audit your contractor arrangements annually.',
   mistakes:['Assuming a signed contractor agreement is legally determinative','Having contractors work exclusively for you on fixed monthly retainers for years'],
   scenario:'Freelance designer, 3 years, full-time, company equipment, daily standups, monthly retainer. Contractor? Answer: Almost certainly not. This is an employment relationship.',
   law:'Employment Act 1955 (general), EPF Act 1991 Section 2, Nadarajan v Palm Grove Estate (1974)',
   takeaway:'The substance of the working relationship — not the label — determines classification. When in doubt, assume employment risk.'},

  {id:'eb6', title:'Payment of Wages — Deadlines and Offences',
   intro:'Late salary is not just bad practice — it is a criminal offence.',
   concept:'The EA mandates specific deadlines for wage payment. Violations carry fines.',
   rule:'Monthly employees must be paid by the 7th day after the last day of the wage period. On termination: all wages including accrued leave must be paid within 7 days.',
   explanation:'The 7-day termination payment rule catches many HR teams off-guard when leave encashment calculations are pending. Build internal SLAs for this.',
   why:'Wage security is foundational to employee welfare. Delayed wages cause financial hardship.',
   hrbp:'Set up payroll SLAs for exit processing. Calculate leave balances before the last day so final payment can be made on time.',
   mistakes:['Waiting for the full next payroll cycle to pay off a terminated employee','Excluding leave encashment from the 7-day calculation'],
   scenario:"Employee's last day is 20 March. When must final pay be made? Answer: By 27 March. Missing this is an EA violation.",
   law:'Employment Act 1955, Sections 18, 19, 25',
   takeaway:'Final wages = basic pay + any outstanding leave encashment. All of it must be paid within 7 days of the last day of employment.'},
  {id:'eb7', title:"The Employment Contract — Oral vs Written",
   intro:'An oral employment contract is legally valid in Malaysia. That doesn\'t mean you should rely on one.',
   concept:'Malaysian law recognises oral employment contracts as valid. However, the EA requires contracts longer than 1 month to be in writing if they contain specific terms.',
   rule:'Without a written contract, courts imply terms from conduct, industry norms, and EA minimums. A signed written contract is the only way to create certainty.',
   explanation:'Key clauses to include: probation period, notice period, job scope, KPIs, confidentiality, intellectual property assignment, and restraint of trade (if relevant). Restraint of trade clauses are enforceable only if reasonable in scope, geography, and duration.',
   why:'Employment relationships create long-term obligations. Written contracts create clarity and reduce disputes.',
   hrbp:'A sales executive resigns and claims she was never told her notice period is 2 months. The offer letter was sent by email but never signed. Position: the unsigned offer letter may still be enforceable if she accepted it by starting work — but this grey zone is easily avoided.',
   mistakes:['Using generic template contracts without tailoring to the role','Restraint of trade clauses that are so broad they are unenforceable'],
   scenario:'Offer letter sent by email, never signed. Employee resigns and disputes the 2-month notice. Outcome? Answer: She may still be bound if she accepted the terms by commencing work. Courts look at conduct.',
   law:'Employment Act 1955, Section 10; Contracts Act 1950',
   takeaway:'Written contracts, signed by both parties, are the only reliable foundation. Template contracts must be tailored. Restraint of trade must be reasonable to be enforceable.'},

  {id:'eb8', title:'Rest Days — Statutory Entitlement',
   intro:'Every EA-covered employee is entitled to at least one rest day per week. This is non-negotiable.',
   concept:'EA Section 59 guarantees at least one rest day per week for all covered employees.',
   rule:'6-day week employees: 1 rest day (usually Sunday). 5-day week employees: Saturday and Sunday. Working on a rest day = 2× ordinary rate of pay.',
   explanation:'Shift-based industries can designate rotating rest days — it does not have to be Sunday. But the designation must be communicated in advance, and rest day pay rates apply if work is required.',
   why:'Rest is a basic human requirement. The EA formalises this to prevent exploitative scheduling.',
   hrbp:'Retail employee called in on designated rest day for a stock take. Pay? Daily rate × 2. If the rest day coincides with a public holiday, 3× applies.',
   mistakes:['Not designating rest days clearly in shift rosters','Paying ordinary rate for rest day work instead of the 2× premium'],
   scenario:'Retail worker, RM1,500/month, called in on Sunday (designated rest day). Pay for that day? Answer: Daily rate × 2. Daily rate = RM1,500/26 = RM57.69 × 2 = RM115.38.',
   law:'Employment Act 1955, Sections 59–60',
   takeaway:'1 rest day minimum per week. Mandatory rest day rates: 2× for a full day. Communicate designated rest days clearly in rosters.'},

  {id:'eb9', title:'Fixed-Term Contracts — Risks and Limits',
   intro:"Fixed-term contracts are not a way to avoid EA obligations. Courts see through abuse.",
   concept:'Fixed-term contracts end on a specified date. Non-renewal is generally not a dismissal. But perpetual fixed-term renewals can create permanent employment status.',
   rule:'If back-to-back fixed-term contracts create a reasonable expectation of permanency, courts may treat non-renewal as dismissal (Goon Kwee Phoy principle).',
   explanation:'The risk: someone on 10 consecutive 1-year contracts may argue they are effectively a permanent employee. If the role is ongoing, use a permanent contract.',
   why:'Fixed-term arrangements are for genuinely temporary needs — project work, cover, pilot roles. They should not be permanent employment disguised as temporary.',
   hrbp:'Review your use of fixed-term contracts annually. If a role has been continuously filled for 2+ years through renewals, convert to permanent.',
   mistakes:['Renewing fixed-term contracts indefinitely for roles that are permanently needed','Not giving advance notice of non-renewal — at least 1 month is best practice'],
   scenario:'Staff member on 1-year contracts for 5 years. Company decides not to renew. She files unfair dismissal. Outcome? Answer: Risky. Pattern of renewals may have created reasonable expectation of continued employment.',
   law:'Industrial Relations Act 1967, Section 20; Goon Kwee Phoy v J & P Coats (Malaysia) Berhad (1981)',
   takeaway:"Fixed-term for genuinely temporary needs only. If the role is ongoing, use permanent contracts. Perpetual renewals = permanent employee risk."},

  {id:'eb10', title:'Part-Time Employment — Rights and Protections',
   intro:'Part-time employees have statutory protections under the EA. They cannot simply be treated as contractors.',
   concept:'Part-time employees (working fewer than 30% of normal working hours) are covered by the Employment (Part-Time Employees) Regulations 2010.',
   rule:'Part-time employees are entitled to: proportionate leave, EPF, SOCSO, EIS, and minimum wage (pro-rated). Their hourly rate must not be less than full-time equivalents.',
   explanation:'The regulations prevent "part-timing" as a mechanism to avoid statutory obligations. Pro-rated entitlements must be calculated correctly.',
   why:'Part-time work is a legitimate and growing employment arrangement. Workers in these arrangements need the same statutory protection framework.',
   hrbp:'Calculate part-time entitlements by pro-rating: hours worked ÷ normal full-time hours × full entitlement. The calculation method must be consistent.',
   mistakes:['Treating part-timers as independent contractors to avoid payroll obligations','Paying part-timers less than the equivalent hourly rate of full-time employees in the same role'],
   scenario:'Part-time employee works 20 hours/week (normal hours are 40). Annual leave entitlement for 2 years service? Answer: 8 days × (20/40) = 4 days per year.',
   law:'Employment (Part-Time Employees) Regulations 2010; Employment Act 1955',
   takeaway:'Part-time ≠ contractor. Pro-rate entitlements correctly. Minimum wage applies on an hourly basis. Same EPF, SOCSO, EIS obligations apply.'},

  {id:'eb11', title:'Secondment Arrangements — Who Is Responsible?',
   intro:'When you second an employee to another entity, both the seconding and host organisations have legal obligations.',
   concept:'Secondment is a temporary arrangement where an employee works for a different entity (the host) while remaining employed by the original employer (the seconding entity).',
   rule:'The seconding entity remains the legal employer — responsible for pay, EA obligations, termination. The host entity has operational control and a duty of care under the work environment.',
   explanation:'Key risks: the host treats the employee as their employee (creating a deemed employment relationship), the secondee is misclassified after a long-term secondment, or the secondment agreement does not clearly allocate liability.',
   why:'Group company secondments and client secondments are common in Malaysia. The legal obligations must be correctly allocated to avoid liability gaps.',
   hrbp:'Document every secondment with a written agreement: duration, who pays (and how reimbursed), who manages performance, what happens at the end. Review duration — extended secondments create reclassification risk.',
   mistakes:['Verbal secondment arrangements with no written documentation','Host entity managing performance, pay, and discipline — effectively becoming the employer'],
   scenario:'Employee seconded to client for 3 years. Client manages all aspects of her work. Who is her employer? Answer: Courts may find the client is the employer by conduct. A written secondment agreement, maintained correctly, is essential.',
   law:'Employment Act 1955 (general); common law principles on employer identity',
   takeaway:'Secondment = the original employer remains responsible. Document it. Limit duration. Preserve the seconding employer\'s role in pay and HR decisions.'},
  {id:'eb12', title:'Discretionary vs Contractual Benefits',
   intro:'Once you give a benefit consistently enough, it may stop being discretionary.',
   concept:'Benefits can be contractual (written into the contract or policy) or discretionary (given at employer\'s choice). The distinction matters enormously when you want to remove or change them.',
   rule:'A benefit given consistently over a long period may become an implied contractual term — even if originally described as "discretionary." Courts look at the practice, not just the label.',
   explanation:'Examples: annual bonuses described as "ex-gratia" but paid every year for 10 years; transport allowances paid monthly but labelled "at company\'s discretion." Over time, employees may have a legitimate expectation of these.',
   why:'Implied contractual terms protect employees from having established practices suddenly withdrawn.',
   hrbp:'If you want a benefit to remain truly discretionary, vary it year to year. Never pay a "discretionary" bonus at the same amount to all staff every year — that looks like a fixed entitlement.',
   mistakes:['Describing a benefit as discretionary in the contract but paying it identically year after year','Withdrawing a long-standing practice without any consultation or notice'],
   scenario:'Company removes a transport allowance that had been paid monthly for 8 years, described in contracts as "at company\'s discretion." Employees challenge. Outcome? Answer: Courts may find the consistent practice created an implied contractual entitlement. Withdrawal without agreement may be a breach.',
   law:'Contracts Act 1950; Industrial Relations Act 1967; implied terms doctrine',
   takeaway:'Discretionary benefits that are paid consistently lose their discretionary character over time. Vary the practice intentionally or accept it has become contractual.'},

  {id:'eb13', title:'Outsourcing and Labour Contractors — Who Is the Real Employer?',
   intro:'Engaging workers through a contractor does not always shield the principal employer from liability.',
   concept:'When a business engages a labour contractor who supplies workers, the principal employer may be deemed the real employer depending on how the arrangement operates in practice.',
   rule:'Malaysian courts apply the economic reality and control tests. If the principal employer directs, controls, and integrates the workers into its operations, the "contractor" label may not protect it.',
   explanation:'This matters for: termination claims (the worker sues the principal), statutory benefits (EPF, SOCSO — who is the employer?), and minimum wage compliance.',
   why:'Some businesses use labour contractors as a legal buffer. Courts pierce this structure when the substance is employment with the principal.',
   hrbp:'Review all labour contractor arrangements: Who gives day-to-day instructions? Who controls the work hours? Who provides equipment? If the answers point to you — you may be the employer.',
   mistakes:['Assuming a contract with a labour contractor completely transfers all employment risk','Labour contractors who are not actually paying EPF/SOCSO — the principal may be jointly liable'],
   scenario:'Factory uses a contractor for 200 workers. The factory foreman directs their work, sets their hours, and uses factory equipment. Workers retrenched. Who pays termination benefits? Answer: Courts may find the factory is the real employer. "Outsourced" labels do not override economic reality.',
   law:'Employment Act 1955; EPF Act 1991; Industrial Relations Act 1967',
   takeaway:'Labour contractor arrangements must reflect genuine separation of control. If you direct the work, you may be the employer. Annual legal review of contractor arrangements is essential.'},

  {id:'eb14', title:'Non-Compete and Non-Solicitation Clauses',
   intro:'Non-compete clauses in Malaysian employment contracts are enforceable — but only if reasonable.',
   concept:'Post-employment restraint of trade clauses restrict former employees from working for competitors or soliciting clients/colleagues for a defined period.',
   rule:'Enforceability test: (1) Legitimate business interest to protect, (2) Reasonable in scope (what activities are restricted?), (3) Reasonable in geography (what territory?), (4) Reasonable in duration (how long?).',
   explanation:'Malaysian courts have struck down broadly drafted clauses that effectively prevent a person from earning a living. 6-month non-competes in narrow sectors are generally more enforceable than 2-year global bans.',
   why:'Employers have legitimate interests in protecting client relationships and confidential information. But overly broad restrictions unfairly prevent employees from earning a livelihood.',
   hrbp:'Draft non-competes narrowly: limit to specific direct competitors, to the employee\'s actual market territory, for no more than 6–12 months. The more senior and specialised the employee, the more justifiable a broader clause.',
   mistakes:['Copy-pasting generic "worldwide, 2-year, all industry" non-compete language','Not considering that unenforceable clauses provide zero practical protection'],
   scenario:'Sales executive joins competitor 1 month after resignation, taking 5 clients. Company has a 12-month non-solicitation clause for clients she personally served. Enforceable? Answer: Likely yes — specific clients, reasonable duration, legitimate interest (client relationships she developed using company resources).',
   law:'Contracts Act 1950, Section 28 (restraint of trade); common law',
   takeaway:'Non-competes: narrow scope + specific territory + short duration = more enforceable. Wide scope + global + long duration = likely struck down. Tailor every clause to the actual risk.'},
],

'leave': [
  {id:'l1', title:'Annual Leave — The Entitlement Brackets',
   intro:'Annual leave increases with service length — and many HR systems get the pro-ration wrong.',
   concept:'EA Section 60E mandates minimum annual leave based on length of service.',
   rule:'< 2 years: 8 days/yr | 2–5 years: 12 days/yr | 5+ years: 16 days/yr. These are minimums — companies can and should exceed them.',
   explanation:'Leave is pro-rated in the joining year and exit year. Leave accrues by contract anniversary or calendar year depending on policy.',
   why:'Rewarding loyalty through leave incentivises retention while ensuring workers get adequate rest.',
   hrbp:'When pro-rating a new joiner\'s leave, calculate from start date to end of leave year — not dividing by 12 blindly. October joiner = 3 months remaining.',
   mistakes:['Pro-rating from January instead of the actual start date','Applying company policy leave brackets to EA-covered employees when company policy is below EA minimums'],
   scenario:'Employee joins 1 March, leave year Jan–Dec, earns 8 days/year. Days available? Answer: 8 × (10/12) = 6.67 days → 7 days.',
   law:'Employment Act 1955, Section 60E',
   takeaway:'Statutory minimums cannot be undercut. If your policy grants fewer days than EA mandates, the EA minimum applies regardless.',
   diagram:`<svg viewBox="0 0 320 120" xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif">
  <text x="160" y="18" text-anchor="middle" fill="#4a9464" font-size="10" font-weight="700" letter-spacing="1">ANNUAL LEAVE ENTITLEMENT</text>
  ${[['< 2 years','8 days / year',0.5],['2 – 5 years','12 days / year',0.75],['5+ years','16 days / year',1]].map(([l,v,pct],i)=>`
  <rect x="10" y="${28+i*28}" width="${pct*220}" height="20" rx="4" fill="#1a2e20"/>
  <rect x="10" y="${28+i*28}" width="${pct*220}" height="20" rx="4" fill="#4a9464" fill-opacity="${0.4+i*0.25}"/>
  <text x="18" y="${42+i*28}" fill="#f0ebe0" font-size="10.5" font-weight="500">${l}</text>
  <text x="${10+pct*220+6}" y="${42+i*28}" fill="#4a9464" font-size="11" font-weight="700">${v}</text>`).join('')}
</svg>`},

  {id:'l2', title:'Sick Leave vs Hospitalisation Leave',
   intro:'Two separate pools. Using one never reduces the other.',
   concept:'The EA provides two completely independent sick leave entitlements that run in parallel.',
   rule:'< 2 years: 14 days outpatient + 60 days hospitalisation | 2–5 years: 18 + 60 | 5+: 22 + 60.',
   explanation:'Hospitalisation leave requires actual hospital admission or day surgery. Outpatient sick leave requires an MC. Both pools are tracked separately — hospitalisation absence never touches the sick leave balance.',
   why:'Hospitalisation involves greater medical cost and recovery time. Separate entitlements prevent serious illness from depleting regular sick leave.',
   hrbp:'HRMS systems frequently misconfigure this. Test your system: apply 10 days hospitalisation leave and confirm outpatient balance is unchanged.',
   mistakes:['Deducting hospitalisation days from the sick leave balance','Applying only the smaller outpatient entitlement and ignoring hospitalisation'],
   scenario:'Employee, 4 years service, hospitalised 20 days, then 3-day outpatient MC. Remaining? Answer: Hosp: 40/60 remaining. Outpatient: 15/18 remaining. Separate pools.',
   law:'Employment Act 1955, Section 60F',
   takeaway:'Always maintain two separate leave balances per employee. They are independent entitlements, not a combined pool.'},

  {id:'l3', title:'Maternity Leave — 98 Calendar Days',
   intro:'98 days of maternity leave — and most HRMS systems calculate it wrong.',
   concept:'Every eligible pregnant employee is entitled to 98 consecutive calendar days of maternity leave.',
   rule:'Calendar days — not working days. Leave can begin up to 30 days before expected delivery. A late baby does not extend the period.',
   explanation:'98 calendar days ≈ 14 weeks. Many HRMS calculate working days by default, giving ~20 weeks — dangerously wrong. The leave clock starts when it starts, regardless of delivery timing.',
   why:'Maternity leave covers both pre-natal rest and postnatal recovery.',
   hrbp:'Verify your HRMS is tracking calendar days. Starting 1 March means ending 7 June — regardless of when the baby arrives.',
   mistakes:['Counting 98 working days instead of calendar days','Extending the leave period when delivery comes later than expected'],
   scenario:'Employee starts leave 1 March (30 days early). Baby arrives 10 April. When does leave end? Answer: 7 June (98 calendar days from 1 March). Delivery date is irrelevant.',
   law:'Employment Act 1955, Sections 37–41',
   takeaway:'Maternity leave = 98 consecutive calendar days from the day it starts. Weekends and public holidays count. The HRMS default setting matters enormously here.'},

  {id:'l4', title:'Paternity Leave — 7 Days (Since 2023)',
   intro:'New in 2023 — many employees and even HR teams still don\'t know about this.',
   concept:'Male employees gained a statutory right to 7 consecutive paid days paternity leave under the 2022 EA amendment.',
   rule:'7 days per confinement, up to 5 confinements. Employee must have 12+ months service and be married to the mother at the time.',
   explanation:'The 12-month service requirement means new hires miss out. An October joiner whose wife delivers in March has only 5 months service — not eligible.',
   why:'Shared parental responsibility and alignment with ILO standards.',
   hrbp:'Update onboarding materials and leave policies. Audit your HRMS to add paternity leave entitlement configuration.',
   mistakes:['Granting paternity leave to employees with < 12 months service','Failing to update employment contracts to reflect the new entitlement'],
   scenario:'Employee with 8 months service has a newborn. Entitled to paternity leave? Answer: No — 12-month requirement not met. Can apply for annual or unpaid leave.',
   law:'Employment Act 1955, Section 60FA (inserted by EA Amendment 2022)',
   takeaway:'7 days paternity leave, 12 months minimum service, legally married. Three conditions — all must be met.'},

  {id:'l5', title:'Carry-Forward Leave & Exit Encashment',
   intro:'"No carry-forward" does NOT mean "no encashment on resignation." This trips up every payroll team.',
   concept:'Two distinct concepts often confused: carry-forward (discretionary during employment) vs encashment on exit (statutory right).',
   rule:'Employers can forfeit unused leave at year-end if the policy says so. But on termination or resignation, accrued unused leave MUST be encashed — it cannot be forfeited.',
   explanation:'Even if your policy says "use it or lose it", an employee who resigns with 8 days unused leave is legally entitled to payment for those 8 days at their daily wage rate.',
   why:'Leave serves a welfare function. Exit encashment ensures workers are not penalised for work demands preventing them from taking leave.',
   hrbp:'The encashment-on-exit rule applies regardless of any internal policy. Update payroll SOP to always calculate and pay unused leave on exit.',
   mistakes:['"No carry-forward" policy applied to exit encashment','Not calculating the correct daily rate (EA wages base, not gross)'],
   scenario:'Employee resigns with 8 unused days. Company has "no carry-forward, no encashment" policy. Enforceable? Answer: No. Exit encashment is a statutory right. The policy is unlawful.',
   law:'Employment Act 1955, Section 60E(3) and 60E(4)',
   takeaway:'Carry-forward forfeiture: legal. Exit encashment forfeiture: illegal. These are different rules governing different situations.'},

  {id:'l6', title:'Public Holidays — 11 Days, 5 Compulsory',
   intro:'You cannot replace or remove the 5 compulsory public holidays. Full stop.',
   concept:'EA mandates a minimum of 11 paid public holidays per year, of which 5 are compulsory and cannot be substituted.',
   rule:'Compulsory 5: National Day (31 Aug), Agong\'s Birthday, State Ruler\'s Birthday, Workers\' Day (1 May), Malaysia Day (16 Sep). Working on a public holiday = 3× daily rate.',
   explanation:'The remaining 6 can be any gazetted holidays. If a PH falls on a rest day, the next working day is the substitute holiday.',
   why:'Public holidays are nationally designated days of rest and celebration.',
   hrbp:'3× pay calculation: Daily rate × 3. Not 1.5× or 2×. This is one of the most common payroll errors for shift workers.',
   mistakes:['Paying only 2× for public holiday work (rest day rate applied in error)','Removing or substituting the 5 compulsory public holidays'],
   scenario:'Customer service employee, daily rate RM80, works Merdeka Day. Pay? Answer: RM80 × 3 = RM240 for that day.',
   law:'Employment Act 1955, Section 60D; Holidays Act 1951',
   takeaway:'11 PH minimum; 5 are compulsory and untouchable; work on PH = 3× daily rate. Audit payroll for this calculation.'},

  {id:'l7', title:'AWOL and Sick Leave Without MC',
   intro:'Self-certified sick leave is not recognised. The process for handling AWOL matters enormously.',
   concept:'Sick leave is only valid with a medical certificate from a registered doctor. Absence without MC or valid excuse is AWOL.',
   rule:'AWOL for 2+ consecutive working days without valid excuse = deemed breach of contract under EA Section 15(2). Must still follow fair process before treating as termination.',
   explanation:'Section 15(2) is powerful but dangerous to invoke carelessly. Document every step. Send written notifications. Request retrospective MC before escalating.',
   why:'The MC requirement creates an objective standard to prevent abuse of sick leave entitlements.',
   hrbp:'Build a clear AWOL protocol: written contact on Day 1, show-cause on Day 2, request for MC, then DI if no valid response.',
   mistakes:['Invoking Section 15(2) termination without proper written process','Treating WhatsApp messages as sufficient documentation'],
   scenario:'Employee absent Mon–Tue, no MC, no communication. Then claims too sick to see doctor. HR next step? Answer: Request retrospective MC. If unavailable, treat as AWOL and initiate DI.',
   law:'Employment Act 1955, Section 60F(3); Section 15(2)',
   takeaway:'AWOL process: Write first. Communicate in writing. Request MC. DI if unresolved. Never invoke termination without documented process.'},
  {id:'l8', title:'Emergency Leave — No Statutory Entitlement',
   intro:"There is no statutory emergency leave in Malaysia. What you see in company policies is entirely discretionary.",
   concept:'The EA does not provide for emergency or compassionate leave. Any emergency leave granted by employers is a contractual benefit.',
   rule:'Without a policy provision, employees must use annual leave or unpaid leave during family emergencies. Best practice: define "immediate family" explicitly in the policy.',
   explanation:'Common practice: 2–3 days compassionate leave for death of immediate family. Disputes arise over whether grandparents, siblings, or in-laws qualify. Clarity in policy prevents this.',
   why:'Emergency leave policies signal organisational values. They are culture signals as much as legal provisions.',
   hrbp:'Policy language matters: "immediate family" should be defined as: spouse, children, parents, siblings, grandparents (or a subset). Without a definition, every case becomes a discretionary decision.',
   mistakes:['No definition of "immediate family" — every compassionate leave request becomes a negotiation','Inconsistent application across managers, creating discrimination risk'],
   scenario:"Employee's grandfather passes. 3-day emergency leave requested. Policy covers 'immediate family' but doesn't define it. Action? Answer: Approve it and fix the policy. This is a culture question as much as a legal one.",
   law:'Employment Act 1955 (no provision); governed by contract/policy',
   takeaway:'No statutory emergency leave. Define it clearly in policy. Apply it consistently. Inconsistent application creates discrimination risk.'},

  {id:'l9', title:'Unpaid Leave — Employer Discretion and Its Limits',
   intro:"Employees have no right to demand unpaid leave — but refusing it during genuine medical hardship carries constructive dismissal risk.",
   concept:'There is no statutory entitlement to unpaid leave except specific provisions like the unpaid portion of maternity leave.',
   rule:'Granting unpaid leave is at employer discretion. However, refusing unpaid medical leave when sick leave is exhausted may constitute constructive dismissal if the refusal is unreasonable.',
   explanation:'Courts have recognised that refusing unpaid leave during genuine medical hardship, causing the employee no option but to resign, can support a constructive dismissal claim.',
   why:'Unpaid leave is a flexible mechanism beyond statutory entitlements. Leaving it discretionary allows operational balance.',
   hrbp:'Maintain consistent criteria for unpaid leave decisions. Blanket refusals without genuine operational justification create legal risk. Document all approvals and rejections.',
   mistakes:['Categorically refusing all unpaid leave requests without evaluating individual circumstances','Granting unpaid leave to some employees and refusing to others in similar circumstances'],
   scenario:'Employee exhausted all sick leave, has a serious illness, needs 2 more weeks. Requests unpaid leave. Manager refuses. Risk? Answer: If she resigns and demonstrates unreasonable refusal, constructive dismissal claim is possible.',
   law:'Employment Act 1955 (no general provision); Industrial Relations Act 1967 (constructive dismissal)',
   takeaway:'Unpaid leave: discretionary, not a right. But unreasonable refusal during genuine medical hardship = constructive dismissal risk. Apply consistently. Document decisions.'},

  {id:'l10', title:'Voting Leave — A Statutory Right',
   intro:"Employers cannot deduct wages for time taken to vote in elections. Preventing employees from voting is a criminal offence.",
   concept:'Employees must be given sufficient paid time off to vote in general elections (national and state).',
   rule:'Under the Elections Offences Act 1954, hindering an employee from voting is a criminal offence. The amount of time must be sufficient for travel and voting.',
   explanation:'There is no prescribed number of hours. "Reasonableness" is the standard — determined by distance to polling station. Requiring employees to make up the time is an unlawful interference.',
   why:'Voting is a constitutional right. Employment obligations cannot suppress democratic participation.',
   hrbp:'Issue a company-wide communication before any election reminding managers that voting time must be facilitated. Failure to do so is not just an HR risk — it is a criminal offence.',
   mistakes:['Requiring employees to make up voting time','Threatening pay deductions for absence during polling hours'],
   scenario:"Polling day is a working day. Employee's polling station is 45 minutes away. Manager says she must make up the hours. Allowed? Answer: No. Requiring make-up of voting time is unlawful interference with voting rights.",
   law:'Elections Offences Act 1954, Section 25',
   takeaway:'Paid voting time is mandatory. Sufficient for travel and voting. Hindering voting = criminal offence. Communicate this to managers before every election.'},

  {id:'l11', title:'Replacing Leave With Payment — When It Is and Is Not Allowed',
   intro:"Employers sometimes try to pay employees instead of giving leave. This is only permitted in specific circumstances.",
   concept:'EA Section 60E(3): unused annual leave may be forfeited (not encashed) during employment unless policy permits carryover. On exit, encashment is mandatory.',
   rule:'During active employment: an employer may not unilaterally replace annual leave entitlement with cash payment. The employee is entitled to actual time off.',
   explanation:'Exception: if the employee and employer mutually agree to encash leave during employment, this is permissible but must be voluntary. Forced encashment during employment at the expense of actual leave is not permitted.',
   why:'Annual leave serves a welfare function — rest. The law protects actual rest time, not just the monetary value.',
   hrbp:'Some organisations pay out leave balances at year-end instead of allowing employees to take leave. If this is policy-driven rather than voluntary, there is legal risk.',
   mistakes:['Forcing encashment of leave instead of granting actual leave time','Misinterpreting the exit encashment right as permission to encash leave during employment'],
   scenario:'Company policy: "All unused leave at year-end is encashed rather than carried forward." Legal? Answer: The encashment is potentially permissible but must not replace the employee\'s right to take actual leave. The right to time off cannot be unilaterally converted to cash.',
   law:'Employment Act 1955, Section 60E',
   takeaway:'Leave = actual time off from work. Cash encashment during employment requires mutual agreement. Forced encashment instead of actual rest may be unlawful.'},

  {id:'l12', title:"Confinement — What Qualifies as 'Childbirth'",
   intro:"The definition of 'confinement' determines eligibility for maternity leave and allowance. It is narrower than most people assume.",
   concept:"'Confinement' under the EA means parturition (the act of giving birth) resulting in a live birth or a stillbirth after 28 weeks gestation.",
   rule:'Miscarriage before 28 weeks: NOT confinement — employee uses sick or hospitalisation leave. Stillbirth at or after 28 weeks: treated as confinement — full 98-day maternity leave applies.',
   explanation:'This distinction has significant practical implications for HR and for employees. An employee at 24 weeks who suffers a miscarriage is not entitled to maternity leave — but hospitalisation leave covers medical recovery.',
   why:'The legal definition aligns physical recovery needs with the leave entitlement. Late-term losses carry similar physical demands as live births.',
   hrbp:'Handle these situations with sensitivity. The employee may be confused about entitlements. Explain clearly and with compassion. Some progressive employers add a pregnancy loss policy beyond the minimum.',
   mistakes:['Treating all pregnancy losses as entitling 98-day maternity leave','Not advising HR to handle these situations with sensitivity and without unnecessary detail requests'],
   scenario:'Miscarriage at 24 weeks. What leave applies? Answer: Not maternity leave (before 28 weeks). Hospitalisation leave covers medical recovery. Compassionate leave where policy allows.',
   law:'Employment Act 1955, Section 37 (definition of confinement); Section 40 (maternity allowance)',
   takeaway:"Confinement = live birth OR stillbirth at/after 28 weeks. Miscarriage before 28 weeks = sick/hospitalisation leave. Handle all pregnancy loss with care and compassion."},
  {id:'l13', title:'Leave During Notice Period',
   intro:'An employee serving notice can take approved leave — but there are rules about what types.',
   concept:'An employee on notice can apply for and take approved annual leave during the notice period. They cannot unilaterally extend the notice period by taking leave at the end.',
   rule:'Annual leave during notice: permissible if employer approves. Sick leave during notice: if genuine and supported by MC, it applies; the employee is not automatically extending notice. The notice period continues to run during sick leave.',
   explanation:'A common misunderstanding: employees believe sick leave "pauses" their notice period. It generally does not — notice runs concurrently with sick leave.',
   why:'Employment relationships must have clear and certain end dates to enable transition planning on both sides.',
   hrbp:'If a resigning employee takes extended sick leave during notice: the notice period still runs. Final pay includes both the remaining notice pay and the sick leave entitlement for days taken.',
   mistakes:['Telling employees their notice "extends" by the number of sick days taken','Refusing to pay MC-supported sick leave during the notice period'],
   scenario:'Employee gives 4-week notice. Takes 5 days sick leave (with MC) in week 2. Does notice extend to cover those 5 days? Answer: Generally no — notice runs concurrently. Sick leave pay applies for those 5 days, but the employment ends at the original date unless both parties agree to extend.',
   law:'Employment Act 1955, Section 12; common law notice principles',
   takeaway:'Notice runs concurrently with sick leave unless the contract says otherwise. MC-supported sick leave must be paid even during notice. Confirm the end date in writing when notice is given.'},

  {id:'l14', title:'Time Off in Lieu (TOIL) — Is It Legally Recognised?',
   intro:'TOIL is a common practice but is not explicitly defined in the EA. How it works depends on contract and policy.',
   concept:'Time Off in Lieu (TOIL) is a practice where employees who work extra hours receive compensatory time off instead of overtime pay.',
   rule:'For EA-covered employees: TOIL must be agreed — employers cannot unilaterally substitute time off for statutory overtime pay. For non-EA employees: TOIL is entirely contractual.',
   explanation:'The EA prescribes overtime pay rates. Substituting TOIL for overtime requires the employee\'s agreement. If TOIL is the arrangement, the policy must specify: when TOIL must be taken, how it is accrued, and what happens if it is not taken.',
   why:'TOIL can serve both parties — employees prefer flexibility, employers manage cash flow. But it must be structured properly.',
   hrbp:'Build a TOIL policy: TOIL must be taken within 30–60 days, not accumulated indefinitely. Cap it. Define how it is documented.',
   mistakes:['Assuming TOIL is automatically permissible instead of overtime pay for EA-covered employees','No TOIL policy — TOIL balances accumulate for years and become a large liability on exit'],
   scenario:'EA-covered employee works 10 hours overtime. Employer says "take time off next month instead." Legal? Answer: Requires the employee\'s agreement. If she insists on overtime pay, she is entitled to it under the EA. TOIL for EA employees is a substitute for pay, not a right of the employer.',
   law:'Employment Act 1955, Section 60A',
   takeaway:'TOIL for EA-covered employees requires consent — it is not the employer\'s default right. Build a TOIL policy with caps and use-by dates. TOIL balances on exit must be paid out.'},

  {id:'l15', title:'Leave for Religious Observance and Special Events',
   intro:'Malaysia\'s diverse workforce creates real questions about leave for religious observances. The law provides less guidance than most HR teams expect.',
   concept:'There is no specific EA provision for religious observance leave or special event leave beyond gazetted public holidays. These are managed through annual leave, public holidays, or company policy.',
   rule:'Employers are expected to reasonably accommodate requests for leave for major religious observances. Blanket refusals risk constructive dismissal and discrimination claims under the EA 2022 anti-discrimination provisions.',
   explanation:'The EA 2022 amendment introduced protections against discrimination based on religion in employment decisions. While not directly mandating religious leave, refusing leave for observances in a discriminatory way may violate this.',
   why:'Malaysia\'s multicultural workforce means religious diversity is a workplace reality. Reasonable accommodation is both legal best practice and cultural expectation.',
   hrbp:'Create a policy addressing requests for leave for significant religious observances not covered by public holidays. Allow use of annual leave for this purpose. Apply it consistently across all religions.',
   mistakes:['Approving leave for one religion\'s festivals while denying similar requests from another religion','No consistent policy — every request handled ad hoc creates inconsistency and discrimination risk'],
   scenario:'Muslim employee applies for leave for Eid prayers (if not a PH). Chinese employee applies for leave for ancestral rites not covered by public holiday. How should HR treat these? Answer: Consistently. If one is approved from annual leave, the other should be too. Inconsistency = discrimination risk.',
   law:'Employment Act 1955 (2022 anti-discrimination provisions); Federal Constitution (freedom of religion)',
   takeaway:'Religious observance leave: apply annual leave consistently across religions. Reasonable accommodation reduces legal risk and builds inclusive culture. Document consistent application.'},

  {id:'l16', title:'Long-Term Medical Leave and Reasonable Accommodation',
   intro:'An employee on extended medical leave cannot simply be dismissed for absence. The law requires a more careful process.',
   concept:'When an employee is on long-term medical leave due to a serious illness or disability, the employer has obligations around reasonable accommodation before considering termination.',
   rule:'Terminating an employee solely due to extended illness without exploring accommodation options risks unfair dismissal and discrimination claims. Must first: obtain medical evidence of fitness/prognosis, explore accommodations (modified duties, reduced hours), consult the employee.',
   explanation:'This is a developing area in Malaysian law. The Industrial Court increasingly expects employers to demonstrate they explored alternatives before terminating for medical reasons.',
   why:'Illness is not misconduct. Employment security must be balanced against the employer\'s operational needs — but termination should be a last resort.',
   hrbp:'Build a medical case management process: formal medical leave tracking, obtain medical reports with consent, explore modified duties, document every step before making a termination decision.',
   mistakes:['Dismissing an employee for being "too sick to work" without any exploration of accommodation','Not obtaining formal medical evidence before making any employment decision based on health'],
   scenario:'Employee has been on hospitalisation leave for 3 months. Doctor says recovery will take another 2 months. Company wants to terminate. Correct process? Answer: Obtain a formal medical report. Explore modified duties or leave extension. Consult the employee. Document all steps before considering termination.',
   law:'Employment Act 1955; Industrial Relations Act 1967 (constructive dismissal and unfair dismissal)',
   takeaway:'Long-term illness: explore accommodation first. Obtain formal medical evidence. Consult the employee. Document everything. Termination must be a last resort with a documented process.'},
],

'termination': [
  {id:'t1', title:'Notice Period — EA Minimums',
   intro:'Contracts can exceed EA notice periods but never go below them.',
   concept:'EA Section 12 sets minimum notice periods. If the contract specifies longer, the longer period applies. If shorter, EA minimum prevails.',
   rule:'< 2 years: 4 weeks | 2–5 years: 6 weeks | 5+ years: 8 weeks. Either party can pay salary in lieu of notice.',
   explanation:'Salary-in-lieu is bidirectional: employer can pay employee out of notice, or employee can pay employer to leave immediately. Both must be at ordinary rate of pay.',
   why:'Notice periods protect both parties — time to recruit vs time to find new job.',
   hrbp:'Employee with 3 years\' service, 2-month contract notice. EA is 6 weeks. Which applies? The contract (longer). She can still pay in-lieu if employer agrees.',
   mistakes:['Applying EA minimum when contract specifies longer notice','Calculating in-lieu pay at basic salary only, not ordinary rate of pay'],
   scenario:'Employee with 3 years wants to leave immediately. Contract: 2 months. EA minimum: 6 weeks. Which applies? Answer: 2-month contract notice governs. She can pay in-lieu if both parties agree.',
   law:'Employment Act 1955, Section 12',
   takeaway:'Contract notice ≥ EA minimum → contract governs. Contract notice < EA minimum → EA minimum applies. In-lieu is always at ordinary rate.'},

  {id:'t2', title:'Constructive Dismissal',
   intro:'When a resignation is legally treated as a firing because the employer made it impossible to stay.',
   concept:'Constructive dismissal occurs when an employer\'s conduct fundamentally breaches the employment contract, leaving the employee no reasonable alternative but to resign.',
   rule:'Common triggers: unilateral salary cuts, demotion without cause, harassment, relocation without reasonable terms. Employee must resign promptly — delay can be interpreted as acceptance.',
   explanation:'A constructive dismissal claim is treated identically to unfair dismissal. The employee files at the Industrial Relations Department within 60 days of their last day.',
   why:'Prevents employers from engineering resignations to avoid dismissal obligations.',
   hrbp:'The test: would a reasonable employee in the same situation feel they had no option but to resign? Courts look at whether the employer breached mutual trust and confidence.',
   mistakes:['Making significant changes to job scope, role, or pay without consent','Not documenting the business rationale for restructuring decisions'],
   scenario:'Head of Marketing demoted to admin coordinator at same salary. Resigns next day. Constructive dismissal? Answer: Likely yes — significant demotion without consent = fundamental breach.',
   law:'Industrial Relations Act 1967, Section 20; Wong Chee Hong v Cathay Organisation',
   takeaway:'Any fundamental breach of contract that forces a resignation = constructive dismissal. Treat it the same as wrongful termination in your risk assessment.'},

  {id:'t3', title:"Just Cause — What 'Just Cause or Excuse' Means",
   intro:'Malaysia has no at-will employment. Every termination requires justification.',
   concept:'Under IRA Section 20, employees can challenge any dismissal they believe was without just cause or excuse.',
   rule:'Just cause requires: (1) substantive — a legitimate reason (misconduct, poor performance, redundancy); AND (2) procedural — a fair process was followed.',
   explanation:'You can have an airtight reason but still lose at the Industrial Court if you didn\'t follow due process. Document everything: every warning, every show-cause, every meeting.',
   why:'Employment security is a fundamental right in Malaysia. The IRA protects workers from arbitrary dismissal.',
   hrbp:'Think in two columns: "Substantive" (is the reason valid?) and "Procedural" (did we follow the right steps?). Both must be satisfied.',
   mistakes:['Dismissing for valid reasons but without proper process','Failing to document warnings, PIPs, and HR meetings'],
   scenario:'Employee underperforms. HR terminates without PIP or warnings. Unfair dismissal? Answer: Likely yes — not because the reason was wrong, but because the process was unfair.',
   law:'Industrial Relations Act 1967, Section 20; Employment Act 1955, Section 13',
   takeaway:'Just cause = right reason + right process. One without the other is not enough. Document every step.',
   diagram:`<svg viewBox="0 0 320 140" xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif">

  {id:'t4', title:'Termination Benefits (Section 60J)',
   intro:'Retrenched employees have statutory entitlements — and the calculation formula is specific.',
   concept:'EA Section 60J provides termination benefits for employees terminated due to redundancy. Does not apply to resignations or misconduct dismissals.',
   rule:'< 2 years: 10 days wages/year | 2–5 years: 15 days wages/year | 5+ years: 20 days wages/year. Calculated on daily wages × years of service (pro-rated for partial years).',
   explanation:'Uses EA wages definition — not gross salary. Daily rate = monthly wages ÷ 26. Termination benefit is separate from and in addition to EIS claims.',
   why:'Financial buffer for employees losing their job through no fault of their own.',
   hrbp:'Employee earning RM2,500/month (basic) retrenched after 3 years 4 months. 15 days × 3 + (15 × 4/12) = 50 days. Daily rate = RM2,500/26 = RM96.15. Total = RM4,807.',
   mistakes:['Calculating termination benefits on total CTC instead of EA wages','Forgetting to pro-rate for partial years of service'],
   scenario:'RM2,500/month basic, 3 years 4 months service. Termination benefit? Answer: 50 days wages. Daily RM96.15 × 50 = RM4,807.50.',
   law:'Employment Act 1955, Second Schedule; Section 60J',
   takeaway:'Formula: service bracket × 26 working days per month base × years served. Always use EA wages, never gross.'},

  {id:'t5', title:'Summary Dismissal — Skipping Notice',
   intro:'You can dismiss immediately for gross misconduct — but never without an inquiry.',
   concept:'Summary dismissal is immediate termination without notice, permitted only for gross misconduct.',
   rule:'Even for summary dismissal, an inquiry must be conducted before the decision. The employee must have a chance to be heard.',
   explanation:'Gross misconduct: theft, fraud, violence, serious insubordination. The inquiry doesn\'t have to be a full DI — but it must happen and be documented.',
   why:'Some misconduct is so serious that requiring notice would be unconscionable. Summary dismissal is a safety valve for extreme cases.',
   hrbp:'Theft on CCTV? Still need an inquiry. Issue immediate suspension with pay. Hold even a brief inquiry. Document the employee\'s chance to explain. Only then dismiss.',
   mistakes:['Firing on the spot without any process, even for clear-cut misconduct','Failing to document the inquiry and the employee\'s response'],
   scenario:'Cashier caught on CCTV stealing. GM wants to fire on the spot. Correct action? Answer: Suspend with pay → hold DI → dismiss if proven. CCTV is evidence, but inquiry is still required.',
   law:'Employment Act 1955, Section 14',
   takeaway:'Summary dismissal ≠ dismissal without any process. Inquiry first, always. Even a brief inquiry is better than no inquiry.'},

  {id:'t6', title:'Constructive Dismissal — 60-Day Filing Window',
   intro:'Miss the 60-day window and the claim dies. This is one of the strictest limitations in Malaysian employment law.',
   concept:'An employee who believes they were dismissed without just cause must file with the DGIR within 60 days of the last day of employment.',
   rule:'60 days from dismissal. Filed at the Industrial Relations Department (not the Industrial Court). DGIR attempts conciliation first.',
   explanation:'The clock starts from the date of dismissal — not the date the employee decides to act. Extensions are extremely rare and granted only in exceptional circumstances.',
   why:'Time limitations create finality and prevent stale claims.',
   hrbp:'From the employer\'s side: the 60-day clock is your window of vulnerability. Once it passes without a claim, you have significant closure.',
   mistakes:['Filing the claim at the Industrial Court directly (must go to IRD first)','Employees waiting too long to decide — the clock does not pause'],
   scenario:'Dismissed 1 January. Files 5 March — 63 days later. Time-barred? Answer: Yes. Section 20(1A) is strict. No extension for mere oversight.',
   law:'Industrial Relations Act 1967, Section 20(1A)',
   takeaway:'60 days. Hard limit. Employer: once it passes without a claim, you have significant legal closure. Employee: file early, not late.'},
  {id:'t7', title:'Garden Leave — Legal but Contractual',
   intro:"Placing an employee on garden leave is legal in Malaysia — but only if the contract provides for it.",
   concept:"Garden leave means requiring the employee to stay away from work during the notice period while continuing to receive full pay.",
   rule:'Garden leave is only enforceable if the employment contract contains a clear garden leave clause. Without it, requiring an employee to stay away from work could constitute constructive dismissal.',
   explanation:"Used to protect business interests — preventing departing senior employees from taking clients, data, or relationships during the notice period.",
   why:'Protects sensitive business interests when key personnel transition to competitors.',
   hrbp:'If you want garden leave as an option, include this clause: "The Company reserves the right, at its sole discretion, to require the employee to remain away from premises during any notice period while continuing to receive full pay and benefits."',
   mistakes:['Attempting to impose garden leave without a contractual basis','Not maintaining EA obligations (salary payment, leave accrual) during garden leave'],
   scenario:'VP of Sales resigns to join a competitor. 3-month notice. Can the company put her on garden leave immediately? Answer: Only if the contract has a garden leave clause. Otherwise her agreement is required.',
   law:'Contracts Act 1950; Employment Act 1955 (EA obligations continue during garden leave)',
   takeaway:'Garden leave requires a contract clause. Without it, requiring absence may be constructive dismissal. EA obligations continue throughout the notice period.'},

  {id:'t8', title:'Resignation Retraction — When Employees Change Their Mind',
   intro:"A resignation once accepted is generally irrevocable. But the timing and circumstances matter enormously.",
   concept:"A resignation is a contractual notice of intention to terminate. Once communicated and accepted, it is generally irrevocable under contract law.",
   rule:'If not yet accepted: employee can withdraw. If accepted: irrevocable unless employer agrees. Exception: resignation given under duress or coercion may be treated as invalid or constructive dismissal.',
   explanation:"'Resign or face a DI' ultimatums create duress-based resignation risk. The Industrial Court may set aside a coerced resignation and treat it as dismissal.",
